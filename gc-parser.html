<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GameChanger Box Score Parser</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Barlow Condensed', sans-serif;
  background: #f0f2f5;
  min-height: 100vh;
  padding: 16px 8px 40px;
}
.page { max-width: 700px; margin: 0 auto; }
h1 { font-size: 22px; font-weight: 800; color: #1a1a2e; margin-bottom: 4px; }
.subtitle { font-size: 13px; color: #666; margin-bottom: 16px; font-family: 'Barlow', sans-serif; }

.upload-card {
background: #fff; border-radius: 10px; padding: 20px;
box-shadow: 0 2px 12px rgba(0,0,0,0.10); margin-bottom: 16px;
}
.upload-label {
display: block; border: 2px dashed #ccc; border-radius: 8px;
padding: 24px; text-align: center; cursor: pointer; color: #666;
font-size: 15px; font-weight: 600; transition: border-color 0.2s;
}
.upload-label:hover { border-color: #1a1a2e; color: #1a1a2e; }
input[type=file] { display: none; }
.file-name { font-size: 12px; color: #2a8a4a; font-weight: 600; margin-top: 8px; min-height: 16px; }

/* Game header */
.game-header {
background: #1a1a2e; color: #fff; border-radius: 10px;
padding: 14px 16px; margin-bottom: 12px; display: none;
}
.game-title { font-size: 18px; font-weight: 800; letter-spacing: 0.5px; }
.game-meta { font-size: 12px; color: #aaa; margin-top: 2px; font-family: ‘Barlow’, sans-serif; }

/* Linescore */
.linescore-wrap {
background: #fff; border-radius: 10px; padding: 12px 14px;
box-shadow: 0 2px 12px rgba(0,0,0,0.08); margin-bottom: 12px; display: none; overflow-x: auto;
}
.linescore { border-collapse: collapse; width: 100%; font-family: ‘Barlow Condensed’, sans-serif; }
.linescore th { background: #1a1a2e; color: #fff; padding: 5px 8px; font-size: 11px; text-align: center; }
.linescore td { padding: 5px 8px; font-size: 13px; font-weight: 600; text-align: center; border: 1px solid #e4eaf4; }
.linescore td.team-name { text-align: left; font-weight: 700; background: #f8fafd; min-width: 100px; }
.linescore td.final { font-weight: 800; font-size: 15px; background: #eef3fb; }

/* Pitch count compliance */
.section {
background: #fff; border-radius: 10px; padding: 14px 16px;
box-shadow: 0 2px 12px rgba(0,0,0,0.08); margin-bottom: 12px; display: none;
}
.section-title {
font-size: 11px; font-weight: 700; color: #1a1a2e;
text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 10px;
}

/* Compliance cards */
.compliance-grid { display: flex; flex-wrap: wrap; gap: 8px; }
.compliance-card {
flex: 1 1 140px; border-radius: 8px; padding: 10px 12px;
border: 2px solid #e4eaf4; background: #f8fafd;
}
.compliance-card.safe { border-color: #4ade80; background: #f0fdf4; }
.compliance-card.warn { border-color: #fbbf24; background: #fffbeb; }
.compliance-card.over { border-color: #f87171; background: #fef2f2; }
.cc-name { font-size: 13px; font-weight: 800; color: #1a1a2e; }
.cc-count { font-size: 28px; font-weight: 800; line-height: 1; margin: 4px 0 2px; }
.cc-count.safe { color: #16a34a; }
.cc-count.warn { color: #d97706; }
.cc-count.over { color: #dc2626; }
.cc-strikes { font-size: 11px; color: #666; }
.cc-bar-wrap { background: #e4eaf4; border-radius: 4px; height: 6px; margin-top: 6px; overflow: hidden; }
.cc-bar { height: 100%; border-radius: 4px; transition: width 0.4s; }
.cc-bar.safe { background: #4ade80; }
.cc-bar.warn { background: #fbbf24; }
.cc-bar.over { background: #f87171; }
.cc-status { font-size: 10px; font-weight: 700; margin-top: 4px; }
.cc-status.safe { color: #16a34a; }
.cc-status.warn { color: #d97706; }
.cc-status.over { color: #dc2626; }

/* Pitch limit selector */
.limit-row { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; flex-wrap: wrap; }
.limit-row label { font-size: 11px; font-weight: 700; color: #555; text-transform: uppercase; letter-spacing: 0.5px; }
.limit-row select {
padding: 6px 10px; border: 1px solid #ccc; border-radius: 6px;
font-family: ‘Barlow Condensed’, sans-serif; font-size: 14px; color: #1a1a2e; background: #fff;
}
.limit-note { font-size: 11px; color: #888; font-family: ‘Barlow’, sans-serif; }

/* Pitching table */
.data-table { width: 100%; border-collapse: collapse; font-family: ‘Barlow Condensed’, sans-serif; }
.data-table th {
background: #1a1a2e; color: #fff; font-size: 10px; font-weight: 700;
padding: 5px 4px; text-align: center; white-space: nowrap;
}
.data-table th.left { text-align: left; padding-left: 8px; }
.data-table td {
text-align: center; padding: 5px 4px; font-size: 12px;
border: 1px solid #e4eaf4; background: #f8fafd;
}
.data-table td.left { text-align: left; padding-left: 8px; font-weight: 700; }
.data-table tr:nth-child(even) td { background: #f0f5fc; }
.data-table .total-row td { background: #e0eaf8 !important; font-weight: 700; }
.team-header td {
background: #2d3748 !important; color: #fff !important;
font-weight: 800; font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px;
}

/* Status */
.parse-status {
font-size: 12px; color: #2a8a4a; font-weight: 600;
margin-top: 6px; min-height: 16px; font-family: ‘Barlow’, sans-serif;
}
.parse-status.warn { color: #c0630a; }
</style>

</head>
<body>
<div class="page">
  <h1>⚾ GameChanger Box Score Parser</h1>
  <p class="subtitle">Upload a GameChanger PDF to extract pitch counts, batting stats, and pitching lines.</p>

  <div class="upload-card">
    <label class="upload-label" for="pdfInput">
      📄 Tap to upload GameChanger PDF
    </label>
    <input type="file" id="pdfInput" accept=".pdf">
    <div class="file-name" id="fileName"></div>
    <div class="parse-status" id="parseStatus"></div>
  </div>

  <!-- Game header -->

  <div class="game-header" id="gameHeader">
    <div class="game-title" id="gameTitle">—</div>
    <div class="game-meta" id="gameMeta">—</div>
  </div>

  <!-- Linescore -->

  <div class="linescore-wrap" id="linescoreWrap">
    <table class="linescore" id="linescoreTable"></table>
  </div>

  <!-- Pitch Count Compliance -->

  <div class="section" id="complianceSection">
    <div class="section-title">⚠️ Pitch Count Compliance</div>
    <div class="limit-row">
      <label>Level:</label>
      <select id="pitchLevel" onchange="renderCompliance()">
        <option value="varsity">HS Varsity (max 120)</option>
        <option value="jv">HS Freshman/JV (max 100)</option>
        <option value="ms">Middle School (max 85)</option>
      </select>
    </div>
    <div class="compliance-grid" id="complianceGrid"></div>
  </div>

  <!-- Pitching Stats -->

  <div class="section" id="pitchingSection">
    <div class="section-title">Pitching</div>
    <div style="overflow-x:auto;">
      <table class="data-table" id="pitchingTable"></table>
    </div>
  </div>

  <!-- Save to Database -->

  <div class="section" id="saveSection" style="display:none;">
    <div class="section-title">💾 Save to Database</div>
    <div style="font-family:'Barlow',sans-serif;font-size:13px;color:#555;margin-bottom:12px;">
      Saves Farragut's batting and pitching lines for this game. Duplicates are automatically skipped.
    </div>
    <div class="limit-row" style="margin-bottom:12px;">
      <label>Level:</label>
      <select id="saveLevel" style="padding:6px 10px;border:1px solid #ccc;border-radius:6px;font-family:'Barlow Condensed',sans-serif;font-size:14px;">
        <option value="varsity">Varsity</option>
        <option value="jv">JV</option>
        <option value="ms">Middle School</option>
      </select>
    </div>
    <button onclick="saveToSupabase()" style="width:100%;padding:13px;background:#1a1a2e;border:none;border-radius:8px;font-family:'Barlow Condensed',sans-serif;font-size:17px;font-weight:800;color:#fff;cursor:pointer;letter-spacing:1px;">
      SAVE GAME TO DATABASE
    </button>
    <div id="saveStatus" style="font-size:12px;font-weight:600;margin-top:8px;min-height:16px;text-align:center;font-family:'Barlow',sans-serif;"></div>
  </div>

  <!-- Batting Stats -->

  <div class="section" id="battingSection">
    <div class="section-title">Batting</div>
    <div style="overflow-x:auto;">
      <table class="data-table" id="battingTable"></table>
    </div>
  </div>
</div>

async function supaPost(table, rows) {
  var res = await fetch(SUPABASE_URL + '/rest/v1/' + table, {
    method: 'POST',
    headers: {
      'apikey': SUPABASE_KEY,
      'Authorization': 'Bearer ' + SUPABASE_KEY,
      'Content-Type': 'application/json',
      'Prefer': 'return=minimal,resolution=ignore-duplicates'
    },
    body: JSON.stringify(rows)
  });
  if (!res.ok) { var t = await res.text(); throw new Error(t); }
}

async function saveToSupabase() {
  if (!parsedData) { alert('Parse a PDF first.'); return; }
  var statusEl = document.getElementById('saveStatus');
  var level = document.getElementById('saveLevel').value;
  statusEl.textContent = 'Saving...';
  statusEl.style.color = '#555';

  try {
    // Build a game_id from date + opponent
    var date = parsedData.date || 'unknown';
    var opp = (parsedData.awayCode || 'opp').toLowerCase();
    var gameId = 'frrg-' + date.replace(/\s+/g,'-').replace(/,/g,'') + '-vs-' + opp;

    // Save game record
    await supaPost('hs_games', [{
      school_id: SCHOOL_ID,
      game_id: gameId,
      date: parsedData.date || null,
      display_name: (parsedData.homeTeam || 'Farragut') + ' vs ' + (parsedData.awayTeam || parsedData.awayCode || 'Opponent'),
      opponent: parsedData.awayTeam || parsedData.awayCode || 'Opponent',
      home_away: 'home',
      our_score: parsedData.homeScore || 0,
      opp_score: parsedData.awayScore || 0,
      level: level
    }]);

    // Farragut is home team — save their batters
    var batRows = (parsedData.batting.home || []).map(function(b) {
      return {
        school_id: SCHOOL_ID, game_id: gameId,
        player_name: b.name, jersey: b.number, position: b.pos, team: 'Farragut',
        ab: parseInt(b.ab)||0, r: parseInt(b.r)||0, h: parseInt(b.h)||0,
        rbi: parseInt(b.rbi)||0, bb: parseInt(b.bb)||0, so: parseInt(b.so)||0
      };
    });
    if (batRows.length) await supaPost('hs_batting', batRows);

    // Save Farragut pitchers
    var pitchRows = (parsedData.pitching.home || []).map(function(p) {
      return {
        school_id: SCHOOL_ID, game_id: gameId,
        player_name: p.name, jersey: p.number, team: 'Farragut',
        ip: p.ip,
        h: parseInt(p.h)||0, r: parseInt(p.r)||0, er: parseInt(p.er)||0,
        bb: parseInt(p.bb)||0, k: parseInt(p.k)||0, hr: parseInt(p.hr)||0,
        pitches: p.pitches || null, strikes: p.strikes || null
      };
    });
    if (pitchRows.length) await supaPost('hs_pitching', pitchRows);

    statusEl.textContent = '✓ Saved — ' + batRows.length + ' batters, ' + pitchRows.length + ' pitchers (game: ' + gameId + ')';
    statusEl.style.color = '#2a8a4a';
  } catch(e) {
    statusEl.textContent = '⚠ Error: ' + e.message;
    statusEl.style.color = '#c0630a';
  }
}

pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

var parsedData = null;

document.getElementById('pdfInput').addEventListener('change', function() {
  var file = this.files[0];
  if (!file) return;
  document.getElementById('fileName').textContent = file.name;
  document.getElementById('parseStatus').textContent = 'Parsing...';
  document.getElementById('parseStatus').className = 'parse-status';
  var reader = new FileReader();
  reader.onload = async function(e) {
    try {
      var pdf = await pdfjsLib.getDocument({ data: new Uint8Array(e.target.result) }).promise;
      var fullText = '';
      for (var i = 1; i <= pdf.numPages; i++) {
        var page = await pdf.getPage(i);
        var content = await page.getTextContent();
        fullText += content.items.map(function(x) { return x.str; }).join(' ') + '\n';
      }
      parsedData = parseGameChanger(fullText);
      // Debug: log first 60 lines so we can see what pdf.js extracted
      console.log('RAW LINES:\n' + fullText.split('\n').slice(0,60).join('\n'));
      render(parsedData);
      document.getElementById('saveSection').style.display = 'block';
      document.getElementById('saveStatus').textContent = '';
      document.getElementById('parseStatus').textContent = '✓ Parsed successfully';
    } catch(err) {
      document.getElementById('parseStatus').textContent = '⚠ Error: ' + err.message;
      document.getElementById('parseStatus').className = 'parse-status warn';
    }
  };
  reader.readAsArrayBuffer(file);
});

function parseGameChanger(text) {
  var data = {
    homeTeam: '', awayTeam: '',
    awayScore: 0, homeScore: 0, date: '',
    linescore: [], pitching: { away: [], home: [] }, batting: { away: [], home: [] },
    pitchCounts: {}
  };

  var flat = text.replace(/\s+/g, ' ').trim();

  // ── Score (en dash or hyphen) ─────────────────────────────────────────────
  var scoreMatch = flat.match(/(\d+)\s*[–\-]\s*(\d+)\s+(?:Home|Away|Neutral)/i);
  if (scoreMatch) {
    data.awayScore = parseInt(scoreMatch[1]);
    data.homeScore = parseInt(scoreMatch[2]);
    // Everything before the score block = concatenated team names
    var beforeScore = flat.slice(0, scoreMatch.index).trim();
    // Try to split in half — rough but workable until we find a better separator
    data.gameTeams = beforeScore;
  }

  // ── Date ──────────────────────────────────────────────────────────────────
  var dateMatch = flat.match(/(Monday|Tuesday|Wednesday|Thursday|Friday|Saturday|Sunday)\s+(January|February|March|April|May|June|July|August|September|October|November|December)\s+\d{1,2},?\s+\d{4}/i);
  if (dateMatch) data.date = dateMatch[0];

  // ── Linescore ─────────────────────────────────────────────────────────────
  // "PGNF 0 2 0 0 0 0 0 2 1 4 FRRG 1 0 2 1 6 0 X 10 11 1"
  // Match: 4-6 uppercase letters, 7 innings (digit or X), then R H E
  var lsPat = /([A-Z]{3,6})\s+((?:(?:\d+|X)\s+){6}(?:\d+|X))\s+(\d+)\s+(\d+)\s+(\d+)/g;
  var lsMatches = Array.from(flat.matchAll(lsPat));
  lsMatches.forEach(function(m) {
    data.linescore.push({
      team: m[1],
      innings: m[2].trim().split(/\s+/).map(function(x) { return x === 'X' ? 'X' : parseInt(x); }),
      r: m[3], h: m[4], e: m[5]
    });
  });

  // Use linescore codes as team labels if we have them
  if (data.linescore.length >= 2) {
    data.awayCode = data.linescore[0].team;
    data.homeCode = data.linescore[1].team;
  }

  // ── P-S pitch counts ──────────────────────────────────────────────────────
  var psMatches = flat.matchAll(/P-S:\s*((?:(?:[A-Z][a-z]?\s+)?[A-Z][a-z]+\s+\d+-\d+)(?:,\s*(?:[A-Z][a-z]?\s+)?[A-Z][a-z]+\s+\d+-\d+)*)/g);
  for (var psm of psMatches) {
    var entries = psm[1].matchAll(/(?:[A-Z][a-z]?\s+)?([A-Z][a-z]+)\s+(\d+)-(\d+)/g);
    for (var entry of entries) {
      var ln = entry[1].trim();
      if (!data.pitchCounts[ln]) {
        data.pitchCounts[ln] = { pitches: parseInt(entry[2]), strikes: parseInt(entry[3]) };
      }
    }
  }

  // ── Pitching — split on "... IP H R ER BB SO HR" headers ─────────────────
  var pitchHeaderPat = /([A-Z][A-Za-z]{1,15}(?:\s+[A-Z][A-Za-z…]{0,10})?(?:\s+…)?)\s+IP\s+H\s+R\s+ER\s+BB\s+SO\s+HR/g;
  var pitchHeaderMatches = Array.from(flat.matchAll(pitchHeaderPat));
  if (pitchHeaderMatches[0]) data.awayTeamFull = pitchHeaderMatches[0][1].replace(/…/g,'').trim();
  if (pitchHeaderMatches[1]) data.homeTeamFull = pitchHeaderMatches[1][1].replace(/…/g,'').trim();

  // Get the text after each header
  var pitchSection = flat.slice(flat.indexOf('PITCHING') > -1 ? flat.indexOf('PITCHING') : 0);
  var pitchHeaderPositions = [];
  var phHeaderStarts = [];
  var phPat = /[A-Z][A-Za-z]{1,15}(?:\s+[A-Z][A-Za-z…]{0,10})?(?:\s+…)?\s+IP\s+H\s+R\s+ER\s+BB\s+SO\s+HR/g;
  var phm;
  while ((phm = phPat.exec(pitchSection)) !== null) {
    phHeaderStarts.push(phm.index);
    pitchHeaderPositions.push(phm.index + phm[0].length);
  }

  var pitchRowPat = /([A-Z][a-z…]+(?:\s+[A-Z][a-z…]+)?)\s*(?:…\s*)?#(\d+)\s+([\d.]+)\s+(\d+)\s+(\d+)\s+(\d+)\s+(\d+)\s+(\d+)\s+(\d+)/g;
  var parsePitchBlock = function(block) {
    var pitchers = [];
    var matches = block.matchAll(pitchRowPat);
    for (var m of matches) {
      var name = m[1].trim().replace(/…/g,'').trim();
      if (/^totals$/i.test(name)) continue;
      var lastName = name.split(/\s+/).pop();
      var pcKey = null;
      if (data.pitchCounts[lastName]) {
        pcKey = lastName;
      } else {
        for (var pk in data.pitchCounts) {
          if (pk.toLowerCase().indexOf(lastName.toLowerCase()) === 0) { pcKey = pk; break; }
        }
      }
      var p = { name: name, number: m[2], ip: m[3], h: m[4], r: m[5], er: m[6], bb: m[7], k: m[8], hr: m[9] };
      if (pcKey) { p.pitches = data.pitchCounts[pcKey].pitches; p.strikes = data.pitchCounts[pcKey].strikes; }
      pitchers.push(p);
    }
    return pitchers;
  };

  if (pitchHeaderPositions.length >= 1) {
    var awayPitchEnd = pitchHeaderPositions.length >= 2 ? phHeaderStarts[1] : pitchSection.length;
    data.pitching.away = parsePitchBlock(pitchSection.slice(pitchHeaderPositions[0], awayPitchEnd));
  }
  if (pitchHeaderPositions.length >= 2) {
    data.pitching.home = parsePitchBlock(pitchSection.slice(pitchHeaderPositions[1]));
  }

  // ── Batting — split on "... AB R H RBI BB SO" headers ────────────────────
  var batHeaderPat = /([A-Z][A-Za-z]{1,15}(?:\s+[A-Z][A-Za-z…]{0,10})?(?:\s+…)?)\s+AB\s+R\s+H\s+RBI\s+BB\s+SO/g;
  var batHeaderMatches = Array.from(flat.matchAll(batHeaderPat));
  if (batHeaderMatches[0]) data.awayTeamFull = data.awayTeamFull || batHeaderMatches[0][1].replace(/…/g,'').trim();
  if (batHeaderMatches[1]) data.homeTeamFull = data.homeTeamFull || batHeaderMatches[1][1].replace(/…/g,'').trim();

  var batSection = flat.slice(flat.indexOf('BATTING') > -1 ? flat.indexOf('BATTING') : 0);
  var batHeaderPositions = [];
  var bhHeaderStarts = [];
  var bhPat = /[A-Z][A-Za-z]{1,15}(?:\s+[A-Z][A-Za-z…]{0,10})?(?:\s+…)?\s+AB\s+R\s+H\s+RBI\s+BB\s+SO/g;
  var bhm;
  while ((bhm = bhPat.exec(batSection)) !== null) {
    bhHeaderStarts.push(bhm.index);
    batHeaderPositions.push(bhm.index + bhm[0].length);
  }

  var batRowPat = /(?:CR:\s+)?([A-Z][a-z…]+(?:\s+[A-Z][a-z…]+){0,2})\s*(?:…\s*)?#(\d+)\s+\(([A-Z0-9]+)\)\s+(\d+)\s+(\d+)\s+(\d+)\s+(\d+)\s+(\d+)\s+(\d+)/g;
  var parseBatBlock = function(block) {
    var batters = [];
    var matches = block.matchAll(batRowPat);
    for (var m of matches) {
      var name = m[1].trim().replace(/…/g,'').trim();
      if (/^totals$/i.test(name)) continue;
      // Filter out courtesy runner fragments: short names or single-letter initial only
      var cleanName = name.replace(/[^A-Za-z]/g, '');
      if (cleanName.length < 3) continue;
      batters.push({ name: name, number: m[2], pos: m[3], ab: m[4], r: m[5], h: m[6], rbi: m[7], bb: m[8], so: m[9] });
    }
    return batters;
  };

  if (batHeaderPositions.length >= 1) {
    var awayBatEnd = bhHeaderStarts.length >= 2 ? bhHeaderStarts[1] : batSection.length;
    data.batting.away = parseBatBlock(batSection.slice(batHeaderPositions[0], awayBatEnd));
  }
  if (batHeaderPositions.length >= 2) {
    data.batting.home = parseBatBlock(batSection.slice(batHeaderPositions[1]));
  }

  return data;
}

function render(data) {
  // Game header
  var titleEl = document.getElementById('gameTitle');
  var metaEl  = document.getElementById('gameMeta');
  var awayLabel = data.awayCode || data.awayTeam || 'Away';
  var homeLabel = data.homeCode || data.homeTeam || 'Home';
  titleEl.textContent = awayLabel + '  ' + (data.awayScore || 0) + '  —  ' + (data.homeScore || 0) + '  ' + homeLabel;
  metaEl.textContent  = (data.date || '') + (data.gameTeams ? '  ·  ' + data.gameTeams : '');
  document.getElementById('gameHeader').style.display = 'block';

  // Linescore
  if (data.linescore && data.linescore.length === 2) {
    var maxInn = Math.max(data.linescore[0].innings.length, data.linescore[1].innings.length);
    var thead = '<tr><th class="left">Team</th>';
    for (var i = 1; i <= maxInn; i++) thead += '<th>' + i + '</th>';
    thead += '<th>R</th><th>H</th><th>E</th></tr>';
    var tbody = data.linescore.map(function(row) {
      var cells = '<tr><td class="team-name left">' + row.team + '</td>';
      for (var j = 0; j < maxInn; j++) {
        cells += '<td>' + (row.innings[j] !== undefined ? row.innings[j] : '') + '</td>';
      }
      cells += '<td class="final">' + row.r + '</td><td class="final">' + row.h + '</td><td class="final">' + row.e + '</td></tr>';
      return cells;
    }).join('');
    document.getElementById('linescoreTable').innerHTML = thead + tbody;
    document.getElementById('linescoreWrap').style.display = 'block';
  }

  renderCompliance();
  renderPitching(data);
  renderBatting(data);
}

var TSSAA = {
  varsity: { max:120, rest:[{max:25,days:0},{max:55,days:1},{max:75,days:2},{max:105,days:3},{max:120,days:4}] },
  jv:      { max:100, rest:[{max:25,days:0},{max:40,days:1},{max:65,days:2},{max:80,days:3},{max:100,days:4}] },
  ms:      { max:85,  rest:[{max:19,days:0},{max:35,days:1},{max:50,days:2},{max:66,days:3},{max:85,days:4}] }
};
function getDaysRest(pitches, rules) {
  for (var i=0;i<rules.rest.length;i++) { if (pitches<=rules.rest[i].max) return rules.rest[i].days; }
  return 4;
}

function renderCompliance() {
  if (!parsedData || !Object.keys(parsedData.pitchCounts).length) return;
  var levelKey = document.getElementById('pitchLevel').value;
  var rules = TSSAA[levelKey];
  var limit = rules.max;
  var grid = document.getElementById('complianceGrid');
  grid.innerHTML = '';

  Object.keys(parsedData.pitchCounts).forEach(function(lastName) {
    var pc = parsedData.pitchCounts[lastName];
    var pitches = pc.pitches;
    var strikes = pc.strikes;
    var days = getDaysRest(pitches, rules);
    var over = pitches > limit;
    var pct = Math.min(100, Math.round(pitches / limit * 100));
    var status = over ? 'over' : pitches >= limit * 0.85 ? 'warn' : 'safe';
    var remaining = Math.max(0, limit - pitches);
    var restText = over ? '⛔ OVER LIMIT'
      : days === 0 ? '✓ Can pitch tomorrow'
      : days + ' day' + (days > 1 ? 's' : '') + ' rest required';
    var restColor = over ? 'over' : days === 0 ? 'safe' : days <= 2 ? 'warn' : 'over';

    var card = document.createElement('div');
    card.className = 'compliance-card ' + status;
    card.innerHTML =
      '<div class="cc-name">' + lastName + '</div>' +
      '<div class="cc-count ' + status + '">' + pitches + '</div>' +
      '<div class="cc-strikes">' + strikes + ' strikes · ' + remaining + ' remaining</div>' +
      '<div class="cc-bar-wrap"><div class="cc-bar ' + status + '" style="width:' + pct + '%"></div></div>' +
      '<div class="cc-status ' + restColor + '">' + restText + '</div>';
    grid.appendChild(card);
  });

  document.getElementById('complianceSection').style.display = 'block';
}

function renderPitching(data) {
  var table = document.getElementById('pitchingTable');
  var html = '<thead><tr>' +
    '<th class="left">Pitcher</th><th>IP</th><th>H</th><th>R</th><th>ER</th>' +
    '<th>BB</th><th>K</th><th>HR</th><th>NP</th><th>Str</th>' +
    '</tr></thead><tbody>';

  function teamRows(pitchers, teamName) {
    if (!pitchers.length) return '';
    var rows = '<tr class="team-header"><td class="left" colspan="10">' + teamName + '</td></tr>';
    pitchers.forEach(function(p) {
      rows += '<tr>' +
        '<td class="left">' + p.name + '</td>' +
        '<td>' + p.ip + '</td><td>' + p.h + '</td><td>' + p.r + '</td><td>' + p.er + '</td>' +
        '<td>' + p.bb + '</td><td>' + p.k + '</td><td>' + p.hr + '</td>' +
        '<td>' + (p.pitches !== undefined ? p.pitches : '—') + '</td>' +
        '<td>' + (p.strikes !== undefined ? p.strikes : '—') + '</td>' +
        '</tr>';
    });
    return rows;
  }

  html += teamRows(data.pitching.away, data.awayTeamFull || data.awayTeam || 'Away');
  html += teamRows(data.pitching.home, data.homeTeamFull || data.homeTeam || 'Home');
  html += '</tbody>';
  table.innerHTML = html;
  document.getElementById('pitchingSection').style.display = 'block';
}

function renderBatting(data) {
  var table = document.getElementById('battingTable');
  var html = '<thead><tr>' +
    '<th class="left">Batter</th><th>#</th><th>Pos</th>' +
    '<th>AB</th><th>R</th><th>H</th><th>RBI</th><th>BB</th><th>SO</th>' +
    '</tr></thead><tbody>';

  function teamRows(batters, teamName) {
    if (!batters.length) return '';
    var rows = '<tr class="team-header"><td class="left" colspan="9">' + teamName + '</td></tr>';
    batters.forEach(function(b) {
      rows += '<tr>' +
        '<td class="left">' + b.name + '</td>' +
        '<td>' + b.number + '</td><td>' + b.pos + '</td>' +
        '<td>' + b.ab + '</td><td>' + b.r + '</td><td>' + b.h + '</td>' +
        '<td>' + b.rbi + '</td><td>' + b.bb + '</td><td>' + b.so + '</td>' +
        '</tr>';
    });
    return rows;
  }

  html += teamRows(data.batting.away, data.awayTeamFull || data.awayTeam || 'Away');
  html += teamRows(data.batting.home, data.homeTeamFull || data.homeTeam || 'Home');
  html += '</tbody>';
  table.innerHTML = html;
  document.getElementById('battingSection').style.display = 'block';
}
</script>
