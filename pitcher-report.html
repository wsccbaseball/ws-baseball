<style>

body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0f1117;color:#e2e8f0;min-height:100vh;padding:16px;}

<script>
var SUPABASE_URL = 'https://mghrapwhvihpwgqryail.supabase.co';
var SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1naHJhcHdodmlocHdncXJ5YWlsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU0MjQ0NzUsImV4cCI6MjA5MTAwMDQ3NX0.ilNGmGOOc-TIpwQx0e1cTK1YjYF9TvdL7nEGUEXiWFc';
var EDGE_FN_URL  = 'https://mghrapwhvihpwgqryail.supabase.co/functions/v1/fetch-boxscore';
var LOGO_SRC     = 'LOGO_PLACEHOLDER';

var PITCH_COLORS = {
  'Four-Seam Fastball':'#e74c3c','Fastball':'#e74c3c',
  'Sinker':'#e67e22','Two-Seam Fastball':'#e67e22',
  'Slider':'#27ae60','Curveball':'#2980b9',
  'ChangeUp':'#f39c12','Changeup':'#f39c12','Change Up':'#f39c12',
  'Cutter':'#8e44ad','Splitter':'#16a085','Sweeper':'#1abc9c'
};
var PITCH_ABBR = {
  'Four-Seam Fastball':'FB','Fastball':'FB',
  'Sinker':'SI','Two-Seam Fastball':'SI',
  'Slider':'SL','Curveball':'CU',
  'ChangeUp':'CH','Changeup':'CH','Change Up':'CH',
  'Cutter':'FC','Splitter':'FS','Sweeper':'SW'
};

var pdfStats = {};
var autoStats = {};
var pitchData = [];
var currentTab = 'auto';

// ── UTILS ────────────────────────────────────────────
function avg(arr){ return arr.length ? arr.reduce(function(s,v){return s+v;},0)/arr.length : 0; }
function max(arr){ return arr.length ? Math.max.apply(null,arr) : 0; }
function pct(a,b){ return b ? Math.round(a/b*100) : 0; }
function round1(v){ return isFinite(v) ? Math.round(v*10)/10 : '—'; }
function round0(v){ return isFinite(v) ? Math.round(v) : '—'; }
function flipName(n){
  if(!n) return '';
  var p = n.split(',');
  return p.length === 2 ? p[1].trim()+' '+p[0].trim() : n;
}
function fmtDate(d){
  if(!d) return '';
  var dt = new Date(d+'T12:00:00');
  return dt.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
}

// ── SUPABASE FETCH ───────────────────────────────────
async function supaFetch(path){
  var rows=[],from=0;
  while(true){
    var sep = path.indexOf('?')>-1?'&':'?';
    var r = await fetch(SUPABASE_URL+'/rest/v1/'+path+sep+'limit=1000&offset='+from,
      {headers:{'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY}});
    var d = await r.json();
    if(!Array.isArray(d)||!d.length) break;
    rows = rows.concat(d);
    if(d.length<1000) break;
    from+=1000;
  }
  return rows;
}

// ── TAB SWITCH ───────────────────────────────────────
function switchTab(t){
  currentTab = t;
  document.getElementById('tabAuto').className = 'tab'+(t==='auto'?' active':'');
  document.getElementById('tabPdf').className  = 'tab'+(t==='pdf' ?' active':'');
  document.getElementById('panelAuto').style.display = t==='auto'?'':'none';
  document.getElementById('panelPdf').style.display  = t==='pdf' ?'':'none';
}

// ── AUTO FETCH (via Edge Function) ───────────────────
async function autoFetch(){
  var url = document.getElementById('boxScoreUrl').value.trim();
  if(!url){ setFetchStatus('Paste a wsccathletics.com URL first','err'); return; }
  setFetchStatus('Fetching box score...','');
  try{
    var r = await fetch(EDGE_FN_URL,{
      method:'POST',
      headers:{
        'Content-Type':'application/json',
        'Authorization':'Bearer '+SUPABASE_KEY
      },
      body: JSON.stringify({url:url})
    });
    if(!r.ok) throw new Error('Edge Function returned '+r.status);
    var data = await r.json();
    if(!data||!data.pitchers||!data.pitchers.length) throw new Error('No pitcher data found in response');
    autoStats = {};
    data.pitchers.forEach(function(p){ autoStats[p.name.toUpperCase()] = p; });
    setFetchStatus('Got stats for: '+data.pitchers.map(function(p){return p.name;}).join(', '),'ok');
  }catch(e){
    setFetchStatus('Fetch failed: '+e.message+'. Try PDF instead.','err');
  }
}
function setFetchStatus(msg,cls){
  var el = document.getElementById('fetchStatus');
  el.textContent = msg;
  el.className = 'status'+(cls?' '+cls:'');
}

// ── PDF PARSE ────────────────────────────────────────
document.getElementById('pdfInput').addEventListener('change',function(e){
  var file = e.target.files[0];
  if(!file) return;
  document.getElementById('pdfName').textContent = file.name;
  parsePDF(file);
});

async function parsePDF(file){
  document.getElementById('genStatus').textContent = 'Parsing PDF...';
  try{
    pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
    var ab = await file.arrayBuffer();
    var pdf = await pdfjsLib.getDocument({data:ab}).promise;
    var allText='';
    for(var i=1;i<=pdf.numPages;i++){
      var page=await pdf.getPage(i);
      var tc=await page.getTextContent();
      allText+=tc.items.map(function(t){return t.str;}).join(' ')+'\n';
    }
    pdfStats = parsePitchingLine(allText);
    var names = Object.keys(pdfStats);
    document.getElementById('genStatus').textContent = names.length
      ? 'PDF parsed: '+names.join(', ')
      : 'PDF parsed (no pitcher stats found)';
  }catch(e){
    document.getElementById('genStatus').textContent = 'PDF error: '+e.message;
  }
}

function parsePitchingLine(text){
  var result={};
  var lines = text.split('\n');
  var inPitching=false;
  for(var i=0;i<lines.length;i++){
    var line=lines[i];
    if(/pitching/i.test(line)&&!/batting/i.test(line)) inPitching=true;
    if(!inPitching) continue;
    // Look for lines with IP pattern like "1.0" or "2.1"
    var ipMatch = line.match(/(\d+\.\d)/);
    if(!ipMatch) continue;
    // Try to find a name before the IP
    var nameMatch = line.match(/([A-Z][a-z]+(?:,\s*[A-Z][a-z]+)?)/);
    if(!nameMatch) continue;
    var name = nameMatch[1].trim();
    var nums = line.match(/[\d.]+/g)||[];
    if(nums.length<3) continue;
    // Typical order: IP NP PA H R ER BB SO HBP
    result[name.toUpperCase()]={
      raw:name,
      IP:nums[0]||'',
      NP:'',    // will come from CSV
      PA:nums[2]||'',
      H:nums[3]||'',
      R:nums[4]||'',
      ER:nums[5]||'',
      BB:nums[6]||'',
      SO:nums[7]||'',
      HBP:nums[8]||'0'
    };
  }
  // Fallback: scan for name + IP pattern more aggressively
  if(!Object.keys(result).length){
    var bigText = text.replace(/\s+/g,' ');
    var re=/([A-Z][a-z]+(?:,\s*[A-Z][a-z]+)?)[^0-9]*(\d+\.\d)\s+([\d]+)\s+([\d]+)\s+([\d]+)\s+([\d]+)\s+([\d]+)\s+([\d]+)\s+([\d]+)/g;
    var m;
    while((m=re.exec(bigText))!==null){
      result[m[1].toUpperCase().trim()]={raw:m[1],IP:m[2],NP:'',PA:m[3],H:m[4],R:m[5],ER:m[6],BB:m[7],SO:m[8],HBP:m[9]||'0'};
    }
  }
  return result;
}

// ── LOAD GAMES ───────────────────────────────────────
async function loadGames(){
  try{
    var rows = await supaFetch('pitches?select=GameID,Date');
    var gm={};
    rows.forEach(function(r){if(!gm[r.GameID]) gm[r.GameID]={id:r.GameID,date:r.Date};});
    var games=Object.values(gm).sort(function(a,b){return new Date(a.date)-new Date(b.date);});
    var sel=document.getElementById('gameSelect');
    sel.innerHTML='<option value="">— select game —</option>';
    games.forEach(function(g){
      var d=new Date(g.date+'T12:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
      sel.innerHTML+='<option value="'+g.id+'">'+g.id+' ('+d+')</option>';
    });
  }catch(e){
    document.getElementById('gameSelect').innerHTML='<option>Error loading games</option>';
  }
}

// ── GAME SELECT → PITCHER LIST ───────────────────────
document.getElementById('gameSelect').addEventListener('change',async function(){
  var gameId=this.value;
  var psel=document.getElementById('pitcherSelect');
  var btn=document.getElementById('generateBtn');
  btn.disabled=true;
  btn.textContent='Select game and pitcher first';
  if(!gameId){psel.innerHTML='<option>Select game first</option>';psel.disabled=true;return;}
  psel.innerHTML='<option>Loading pitchers...</option>';
  psel.disabled=true;
  try{
    var rows=await supaFetch('pitches?select=Pitcher,PitcherTeam&GameID=eq.'+encodeURIComponent(gameId));
    var wsP=rows.filter(function(r){return r.PitcherTeam&&r.PitcherTeam.toLowerCase().indexOf('walters')>-1;});
    var src=wsP.length?wsP:rows;
    var pitchers=Array.from(new Set(src.map(function(r){return r.Pitcher;}))).filter(Boolean).sort();
    psel.innerHTML='<option value="">— select pitcher —</option>';
    pitchers.forEach(function(p){psel.innerHTML+='<option value="'+p+'">'+flipName(p)+'</option>';});
    psel.disabled=false;
    pitchData=rows;
  }catch(e){
    psel.innerHTML='<option>Error</option>';
  }
});

document.getElementById('pitcherSelect').addEventListener('change',function(){
  var g=document.getElementById('gameSelect').value;
  var p=this.value;
  var btn=document.getElementById('generateBtn');
  if(g&&p){
    btn.disabled=false;
    btn.textContent='Generate Card';
  }
});

// ── GENERATE ─────────────────────────────────────────
async function generateCard(){
  var gameId=document.getElementById('gameSelect').value;
  var pitcher=document.getElementById('pitcherSelect').value;
  var status=document.getElementById('genStatus');
  status.textContent='Loading pitch data...';
  status.className='status';

  try{
    // Fetch all pitches for this pitcher in this game
    var rows=await supaFetch('pitches?GameID=eq.'+encodeURIComponent(gameId)+'&Pitcher=eq.'+encodeURIComponent(pitcher));
    if(!rows.length) throw new Error('No pitch data found');

    var pitches=rows;
    var date=pitches[0].Date||'';
    var throws=pitches[0].PitcherThrows||'R';
    var opponent='';
    // Try to get opponent from pitches
    var opp=pitches.filter(function(r){return r.BatterTeam&&r.BatterTeam.toLowerCase().indexOf('walters')===-1;});
    if(opp.length) opponent=opp[0].BatterTeam||'';
    else{
      var home=pitches[0].HomeTeam||'';
      var away=pitches[0].AwayTeam||'';
      opponent=(home.toLowerCase().indexOf('walters')===-1?home:away)||'Opponent';
    }

    // Get stats from auto-fetch or PDF
    var statsSource = currentTab==='auto' ? autoStats : pdfStats;
    var statKey = Object.keys(statsSource).find(function(k){
      return pitcher.toUpperCase().indexOf(k)>-1 || k.indexOf(pitcher.split(',')[0].toUpperCase().trim())>-1;
    });
    var stats = statKey ? statsSource[statKey] : {};

    // NP always from CSV
    var npCount = pitches.length;
    stats = Object.assign({},stats,{NP:npCount});

    renderCard(pitcher,throws,date,opponent,gameId,pitches,stats);
    status.textContent='';
    document.getElementById('cardOutput').style.display='block';
    document.getElementById('cardOutput').scrollIntoView({behavior:'smooth'});
  }catch(e){
    status.textContent='Error: '+e.message;
    status.className='status err';
  }
}

// ── RENDER CARD ──────────────────────────────────────
function renderCard(pitcher,throws,date,opponent,gameId,pitches,stats){
  // Group by pitch type
  var types={};
  pitches.forEach(function(p){
    var t=p.TaggedPitchType||'Unknown';
    if(!types[t]) types[t]=[];
    types[t].push(p);
  });

  // Sort types by usage desc
  var sortedTypes=Object.keys(types).sort(function(a,b){return types[b].length-types[a].length;});

  // Compute per-type stats
  var typeStats=sortedTypes.map(function(t){
    var rows=types[t];
    var velos=rows.filter(function(r){return r.RelSpeed>0;}).map(function(r){return parseFloat(r.RelSpeed);});
    var ivbs=rows.filter(function(r){return r.InducedVertBreak!=null;}).map(function(r){return parseFloat(r.InducedVertBreak);});
    var hbs=rows.filter(function(r){return r.HorzBreak!=null;}).map(function(r){return parseFloat(r.HorzBreak);});
    var spins=rows.filter(function(r){return r.SpinRate>0;}).map(function(r){return parseFloat(r.SpinRate);});
    var vaas=rows.filter(function(r){return r.VertApprAngle!=null;}).map(function(r){return parseFloat(r.VertApprAngle);});
    var relhs=rows.filter(function(r){return r.RelHeight>0;}).map(function(r){return parseFloat(r.RelHeight);});
    var exts=rows.filter(function(r){return r.Extension>0;}).map(function(r){return parseFloat(r.Extension);});

    var inZone=rows.filter(function(r){
      var h=parseFloat(r.PlateLocHeight),s=parseFloat(r.PlateLocSide);
      var zt=parseFloat(r.ZoneTop)||2.5,zb=parseFloat(r.ZoneBottom)||1.5;
      return h>=zb&&h<=zt&&Math.abs(s)<=0.708;
    }).length;
    var swStr=rows.filter(function(r){return /swingingstrike|whiff/i.test(r.PitchCall||'');}).length;
    var called=rows.filter(function(r){return /calledstrike|strike/i.test(r.PitchCall||'')&&!/swinging/i.test(r.PitchCall||'');}).length;
    var strikes=rows.filter(function(r){return /strike/i.test(r.PitchCall||'')||/foul/i.test(r.PitchCall||'')||/inplay/i.test(r.PitchCall||'');}).length;

    return {
      type:t,
      abbr:PITCH_ABBR[t]||(t.slice(0,2).toUpperCase()),
      color:PITCH_COLORS[t]||'#888',
      n:rows.length,
      pct:pct(rows.length,pitches.length),
      avgV:avg(velos),maxV:max(velos),
      ivb:avg(ivbs),hb:avg(hbs),
      spin:avg(spins),vaa:avg(vaas),
      relH:avg(relhs),ext:avg(exts),
      znPct:pct(inZone,rows.length),
      whfPct:pct(swStr,rows.filter(function(r){return /swing|whiff|foul/i.test(r.PitchCall||'');}).length||1),
      strPct:pct(strikes,rows.length)
    };
  });

  // Stat line
  var ip=stats.IP||'—',np=stats.NP||pitches.length,pa=stats.PA||'—',er=stats.ER||'—',
      h=stats.H||'—',k=stats.SO||'—',bb=stats.BB||'—',hbp=stats.HBP||'0';
  var swings=pitches.filter(function(r){return /swing|whiff|foul|inplay/i.test(r.PitchCall||'');}).length;
  var whiffs=pitches.filter(function(r){return /swingingstrike|whiff/i.test(r.PitchCall||'');}).length;
  var inZ=pitches.filter(function(r){
    var h2=parseFloat(r.PlateLocHeight),s=parseFloat(r.PlateLocSide);
    var zt=parseFloat(r.ZoneTop)||2.5,zb=parseFloat(r.ZoneBottom)||1.5;
    return h2>=zb&&h2<=zt&&Math.abs(s)<=0.708;
  }).length;
  var allStrikes=pitches.filter(function(r){return /strike/i.test(r.PitchCall||'')||/foul/i.test(r.PitchCall||'')||/inplay/i.test(r.PitchCall||'');}).length;
  var strPctOverall=pct(allStrikes,pitches.length);
  var whiffPctOverall=pct(whiffs,swings||1);

  // Separate LHH and RHH
  var lhh=pitches.filter(function(r){return r.BatterSide==='Left';});
  var rhh=pitches.filter(function(r){return r.BatterSide==='Right';});

  // Legend HTML
  var legendHTML=sortedTypes.map(function(t){
    return '<div class="pc-leg-item"><div class="pc-leg-dot" style="background:'+
      (PITCH_COLORS[t]||'#888')+'"></div>'+
      (PITCH_ABBR[t]||t.slice(0,2).toUpperCase())+' - '+t+
      '</div>';
  }).join('');

  // Color cells for Zn%, Whf%, Str%
  function colorCell(val,metric){
    if(val==='—'||val===undefined) return '<td>—</td>';
    var n=parseFloat(val);
    var cls='';
    if(metric==='zn') cls=n>=50?'clr-g':n>=40?'clr-y':'clr-o';
    if(metric==='whf') cls=n>=25?'clr-g':n>=15?'clr-y':'clr-o';
    if(metric==='str') cls=n>=65?'clr-g':n>=55?'clr-y':'clr-o';
    return '<td class="'+cls+'">'+n+'%</td>';
  }

  // Table rows
  var tableRows=typeStats.map(function(s){
    return '<tr>'+
      '<td style="color:'+(s.color||'#333')+'">'+s.abbr+'</td>'+
      '<td>'+s.n+'</td>'+
      '<td>'+s.pct+'%</td>'+
      '<td>'+round1(s.avgV)+'</td>'+
      '<td>'+round1(s.maxV)+'</td>'+
      '<td>'+round1(s.ivb)+'</td>'+
      '<td>'+round1(s.hb)+'</td>'+
      '<td>'+round0(s.spin)+'</td>'+
      '<td>'+round1(s.vaa)+'</td>'+
      '<td>'+round1(s.relH)+'</td>'+
      '<td>'+round1(s.ext)+'</td>'+
      colorCell(s.znPct,'zn')+
      colorCell(s.whfPct,'whf')+
      colorCell(s.strPct,'str')+
      '</tr>';
  }).join('');

  var totVelos=pitches.filter(function(r){return r.RelSpeed>0;}).map(function(r){return parseFloat(r.RelSpeed);});
  var totRow='<tr>'+
    '<td>TOT</td>'+
    '<td>'+pitches.length+'</td>'+
    '<td>100%</td>'+
    '<td>'+round1(avg(totVelos))+'</td>'+
    '<td>'+round1(max(totVelos))+'</td>'+
    '<td>—</td><td>—</td><td>—</td><td>—</td><td>—</td><td>—</td>'+
    colorCell(pct(inZ,pitches.length),'zn')+
    colorCell(whiffPctOverall,'whf')+
    colorCell(strPctOverall,'str')+
    '</tr>';

  // Logo img or text fallback
  var logoHTML = (LOGO_SRC && LOGO_SRC!=='LOGO_PLACEHOLDER')
    ? '<img class="pc-logo" src="'+LOGO_SRC+'" alt="WS Logo">'
    : '<div class="pc-logo-txt">WALTERS STATE</div>';

  var card=document.getElementById('pitcherCard');
  card.innerHTML=
    '<div class="pc-head">'+
      logoHTML+
      '<div class="pc-title">'+
        '<div class="pc-name">'+flipName(pitcher)+'</div>'+
        '<div class="pc-meta">'+
          (throws==='Left'?'LHP':'RHP')+
          ' &bull; Walters State CC &bull; '+fmtDate(date)+
        '</div>'+
        '<div class="pc-meta" style="margin-top:3px">vs '+opponent+'</div>'+
      '</div>'+
      '<div class="pc-badge">GAME SUMMARY</div>'+
    '</div>'+

    '<div class="pc-stat-bar">'+
      statCell(ip,'IP')+statCell(np,'NP')+statCell(pa,'PA')+statCell(er,'ER')+
      statCell(h,'H')+statCell(k,'K')+statCell(bb,'BB')+statCell(hbp,'HBP')+
      statCell(strPctOverall+'%','STR%')+statCell(whiffPctOverall+'%','WHF%')+
    '</div>'+

    '<div class="pc-charts">'+
      '<div class="pc-chart-box"><div class="pc-chart-title">vs LHH</div><div class="pc-chart-sub">'+lhh.length+' pitches</div><canvas id="cvLHH" width="120" height="135"></canvas></div>'+
      '<div class="pc-chart-box"><div class="pc-chart-title">Movement</div><div class="pc-chart-sub" id="armAngleSub">All Pitches</div><canvas id="cvBRK" width="120" height="135"></canvas></div>'+
      '<div class="pc-chart-box"><div class="pc-chart-title">vs RHH</div><div class="pc-chart-sub">'+rhh.length+' pitches</div><canvas id="cvRHH" width="120" height="135"></canvas></div>'+
    '</div>'+

    '<div class="pc-legend">'+legendHTML+'</div>'+

    '<div class="pc-tbl-wrap"><table class="pc-tbl">'+
      '<thead><tr>'+
        '<th>Pitch</th><th>N</th><th>%</th>'+
        '<th>Avg</th><th>Max</th>'+
        '<th>iVB</th><th>HB</th><th>Spin</th>'+
        '<th>VAA</th><th>RelH</th><th>Ext</th>'+
        '<th>Zn%</th><th>Whf%</th><th>Str%</th>'+
      '</tr></thead>'+
      '<tbody>'+tableRows+totRow+'</tbody>'+
    '</table></div>'+

    '<div class="pc-foot">'+
      '<span>'+opponent+'</span>'+
      '<span>TrackMan &middot; Walters State CC &middot; '+fmtDate(date)+'</span>'+
      '<span>wsccbaseball</span>'+
    '</div>';

  setTimeout(function(){
    var cvLHH=document.getElementById('cvLHH');
    var cvBRK=document.getElementById('cvBRK');
    var cvRHH=document.getElementById('cvRHH');
    if(cvLHH) drawLocChart(cvLHH,lhh,throws);
    if(cvBRK) drawBreakChart(cvBRK,pitches,throws);
    if(cvRHH) drawLocChart(cvRHH,rhh,throws);
  },100);
}

function statCell(val,lbl){
  return '<div class="pc-stat"><div class="pc-stat-val">'+val+'</div><div class="pc-stat-lbl">'+lbl+'</div></div>';
}

// ── LOCATION CHART ────────────────────────────────────
function drawLocChart(cv,pitches,throws){
  var ctx=cv.getContext('2d');
  var W=cv.width,H=cv.height;
  ctx.clearRect(0,0,W,H);

  // Zone bounds in feet: plate ±0.708, height 1.5-3.5 approx
  var xMin=-1.5,xMax=1.5,yMin=0.8,yMax=4.2;
  function mx(v){return (v-xMin)/(xMax-xMin)*W;}
  function my(v){return H-(v-yMin)/(yMax-yMin)*H;}

  // Outer rectangle (chase zone)
  ctx.strokeStyle='#ccc'; ctx.lineWidth=0.5;
  ctx.strokeRect(mx(-1.2),my(4.0),mx(1.2)-mx(-1.2),my(0.9)-my(4.0));

  // Strike zone
  var szL=-0.708,szR=0.708;
  // Use average zone top/bottom from data, fallback to standard
  var ztArr=pitches.filter(function(r){return parseFloat(r.ZoneTop)>0;}).map(function(r){return parseFloat(r.ZoneTop);});
  var zbArr=pitches.filter(function(r){return parseFloat(r.ZoneBottom)>0;}).map(function(r){return parseFloat(r.ZoneBottom);});
  var zt=ztArr.length?avg(ztArr):3.4;
  var zb=zbArr.length?avg(zbArr):1.6;

  ctx.strokeStyle='#333'; ctx.lineWidth=1.5;
  ctx.strokeRect(mx(szL),my(zt),mx(szR)-mx(szL),my(zb)-my(zt));

  // Zone grid lines (3x3)
  var xStep=(szR-szL)/3;
  var yStep=(zt-zb)/3;
  ctx.strokeStyle='#aaa'; ctx.lineWidth=0.5;
  for(var i=1;i<3;i++){
    ctx.beginPath(); ctx.moveTo(mx(szL+xStep*i),my(zt)); ctx.lineTo(mx(szL+xStep*i),my(zb)); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(mx(szL),my(zb+yStep*i)); ctx.lineTo(mx(szR),my(zb+yStep*i)); ctx.stroke();
  }

  // Home plate
  ctx.fillStyle='#ccc';
  ctx.beginPath();
  ctx.moveTo(mx(-0.708),my(0.9)); ctx.lineTo(mx(0.708),my(0.9));
  ctx.lineTo(mx(0.5),my(0.6)); ctx.lineTo(mx(0),my(0.5));
  ctx.lineTo(mx(-0.5),my(0.6)); ctx.closePath(); ctx.fill();

  // Glove / Arm labels
  var gloveStr = throws==='Left' ? 'Arm \u2192' : '\u2190 Glove';
  var armStr   = throws==='Left' ? '\u2190 Glove' : 'Arm \u2192';
  ctx.fillStyle='#999'; ctx.font='7px -apple-system,sans-serif'; ctx.textAlign='left';
  ctx.fillText(gloveStr,2,H-4);
  ctx.textAlign='right';
  ctx.fillText(armStr,W-2,H-4);

  // Dots
  pitches.forEach(function(p){
    var x=parseFloat(p.PlateLocSide),y=parseFloat(p.PlateLocHeight);
    if(isNaN(x)||isNaN(y)) return;
    var t=p.TaggedPitchType||'';
    ctx.beginPath();
    ctx.arc(mx(x),my(y),4,0,2*Math.PI);
    ctx.fillStyle=(PITCH_COLORS[t]||'#888')+'cc';
    ctx.fill();
    ctx.strokeStyle='rgba(0,0,0,.25)'; ctx.lineWidth=0.5;
    ctx.stroke();
  });
}

// ── BREAK CHART ───────────────────────────────────────
function drawBreakChart(cv,pitches,throws){
  var ctx=cv.getContext('2d');
  var W=cv.width,H=cv.height;
  ctx.clearRect(0,0,W,H);

  var hbs=pitches.filter(function(r){return r.HorzBreak!=null;}).map(function(r){return parseFloat(r.HorzBreak);});
  var ivbs=pitches.filter(function(r){return r.InducedVertBreak!=null;}).map(function(r){return parseFloat(r.InducedVertBreak);});
  if(!hbs.length){
    ctx.fillStyle='#999'; ctx.font='10px sans-serif'; ctx.textAlign='center';
    ctx.fillText('No break data',W/2,H/2); return;
  }

  var xRange=Math.max(20,Math.max.apply(null,hbs.map(Math.abs))*1.3);
  var yRange=Math.max(20,Math.max.apply(null,ivbs.map(Math.abs))*1.3);
  function mx(v){return W/2+v/xRange*(W/2-12);}
  function my(v){return H/2-v/yRange*(H/2-12);}

  // Axes
  ctx.strokeStyle='#ddd'; ctx.lineWidth=0.75;
  ctx.beginPath(); ctx.moveTo(0,H/2); ctx.lineTo(W,H/2); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(W/2,0); ctx.lineTo(W/2,H); ctx.stroke();
  ctx.strokeStyle='#eee'; ctx.lineWidth=0.4;
  [-10,0,10].forEach(function(v){
    if(v===0) return;
    ctx.beginPath(); ctx.moveTo(mx(v),0); ctx.lineTo(mx(v),H); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0,my(v)); ctx.lineTo(W,my(v)); ctx.stroke();
  });

  // Axis labels
  ctx.fillStyle='#aaa'; ctx.font='7px sans-serif'; ctx.textAlign='center';
  ctx.fillText('Glide',mx(xRange*0.7),H-3);
  ctx.fillText('Sink',W/2+2,my(-yRange*0.7)+8);
  ctx.fillText('Rise',W/2+2,my(yRange*0.7)-3);

  // Arm side label
  var armLbl = throws==='Left' ? '\u2190 Arm' : 'Arm \u2192';
  ctx.textAlign = throws==='Left' ? 'left' : 'right';
  ctx.fillText(armLbl, throws==='Left'?2:W-2, H-3);

  // Dots
  pitches.forEach(function(p){
    var hb=parseFloat(p.HorzBreak),ivb=parseFloat(p.InducedVertBreak);
    if(isNaN(hb)||isNaN(ivb)) return;
    var t=p.TaggedPitchType||'';
    ctx.beginPath();
    ctx.arc(mx(hb),my(ivb),4,0,2*Math.PI);
    ctx.fillStyle=(PITCH_COLORS[t]||'#888')+'cc';
    ctx.fill();
    ctx.strokeStyle='rgba(0,0,0,.25)'; ctx.lineWidth=0.5;
    ctx.stroke();
  });
}

// ── SAVE IMAGE ────────────────────────────────────────
async function saveImage(){
  var card=document.getElementById('pitcherCard');
  try{
    var canvas=await html2canvas(card,{scale:2,backgroundColor:'#ffffff',useCORS:true,allowTaint:true,logging:false});
    var link=document.createElement('a');
    link.download='pitcher-game-summary.png';
    link.href=canvas.toDataURL('image/png');
    link.click();
  }catch(e){alert('Save error: '+e.message);}
}
