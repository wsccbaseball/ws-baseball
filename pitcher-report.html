<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WS Baseball - Pitcher Game Summary</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0f1117;color:#e2e8f0;min-height:100vh;padding:16px;}
.wrap{max-width:500px;margin:0 auto;}
.page-header{text-align:center;margin-bottom:14px;}
.page-header h1{font-size:18px;font-weight:700;color:#fff;}
.page-header p{font-size:11px;color:#64748b;margin-top:2px;}
.nav{display:flex;gap:8px;justify-content:center;margin-bottom:14px;}
.nav a{font-size:12px;color:#4f8ef7;text-decoration:none;background:#1e2330;border:1px solid #2d3548;border-radius:20px;padding:6px 14px;}
.card{background:#1e2330;border-radius:10px;border:1px solid #2d3548;padding:12px;margin-bottom:10px;}
.card h2{font-size:10px;font-weight:600;color:#64748b;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;}
select{width:100%;background:#141824;border:1px solid #2d3548;border-radius:8px;color:#e2e8f0;padding:9px 11px;font-size:13px;-webkit-appearance:none;}
.upload-zone{border:2px dashed #3d4f6e;border-radius:10px;padding:18px;text-align:center;cursor:pointer;}
.upload-zone p{font-size:12px;color:#94a3b8;}
.upload-zone strong{color:#4f8ef7;}
.upload-zone.done{border-color:#4ade80;background:#0f2a1a;}
.upload-zone.done p{color:#4ade80;}
#pdfInput{display:none;}
.btn{width:100%;padding:12px;border-radius:10px;border:none;font-size:14px;font-weight:600;cursor:pointer;}
.btn-primary{background:#4f8ef7;color:#fff;}
.btn-primary:disabled{background:#2d3548;color:#64748b;cursor:not-allowed;}
.btn-save{background:#4ade80;color:#0f2a1a;margin-top:10px;display:block;text-align:center;padding:12px;border-radius:10px;border:none;font-size:14px;font-weight:600;cursor:pointer;width:100%;}
.status{font-size:12px;color:#94a3b8;text-align:center;padding:5px;}
.status.err{color:#f87171;}
#cardOutput{display:none;margin-top:12px;}

/* ===== PITCHER CARD ===== */
.pc{background:#fff;font-family:'Helvetica Neue',Arial,sans-serif;width:100%;border-radius:10px;overflow:hidden;box-shadow:0 4px 20px rgba(0,0,0,0.3);}
.pc-hdr{background:#1e3a6e;padding:12px 14px;display:grid;grid-template-columns:50px 1fr 50px;align-items:center;gap:6px;}
.pc-logo{width:50px;height:50px;object-fit:contain;background:#fff;border-radius:5px;padding:2px;}
.pc-hdr-mid{text-align:center;}
.pc-name{font-size:22px;font-weight:900;color:#fff;line-height:1;}
.pc-hand{font-size:11px;color:#94b8e8;margin-top:2px;}
.pc-title{font-size:12px;font-weight:700;color:#fff;margin-top:3px;}
.pc-season{font-size:10px;color:#7faee0;font-style:italic;}
.pc-game{background:#ccd9ee;text-align:center;padding:4px;font-size:12px;font-weight:700;color:#1e3a6e;}

/* Single stat row */
.pc-stat-hdr{display:grid;grid-template-columns:repeat(9,1fr);background:#1e3a6e;}
.pc-stat-hdr div{text-align:center;padding:4px 1px;font-size:8px;font-weight:700;color:#94b8e8;border-right:1px solid #2a4a80;}
.pc-stat-hdr div:last-child{border-right:none;}
.pc-stat-vals{display:grid;grid-template-columns:repeat(9,1fr);background:#fff;border-bottom:2px solid #1e3a6e;}
.pc-stat-vals div{text-align:center;padding:6px 1px;font-size:14px;font-weight:900;color:#1e3a6e;border-right:1px solid #e8edf5;}
.pc-stat-vals div:last-child{border-right:none;}

/* Charts */
.pc-charts{display:grid;grid-template-columns:1fr 1fr 1fr;gap:3px;padding:5px;background:#eef2f8;}
.pc-chart{background:#fff;border-radius:4px;padding:4px 3px;text-align:center;}
.pc-chart-title{font-size:8.5px;font-weight:700;color:#1e3a6e;line-height:1.2;}
.pc-chart-sub{font-size:7.5px;color:#64748b;margin-bottom:2px;}
.pc-chart canvas{display:block;margin:0 auto;}

/* Legend */
.pc-legend{display:flex;flex-wrap:wrap;gap:5px 10px;justify-content:center;padding:5px 8px;background:#fff;border-top:1px solid #e8edf5;}
.pc-leg-item{display:flex;align-items:center;gap:3px;font-size:10px;color:#334155;font-weight:600;}
.pc-leg-dot{width:9px;height:9px;border-radius:50%;}

/* Table */
.pc-tbl-wrap{overflow-x:auto;}
.pc-tbl{width:100%;border-collapse:collapse;font-size:10px;}
.pc-tbl th{background:#1e3a6e;color:#94b8e8;padding:4px 2px;text-align:center;font-size:8px;font-weight:700;text-transform:uppercase;white-space:nowrap;}
.pc-tbl td{padding:4px 2px;text-align:center;border-bottom:1px solid #e8edf5;color:#1e3a6e;font-weight:600;}
.pc-tbl tr:nth-child(even) td{background:#f4f7fc;}
.pc-tbl tr.tot td{background:#1e3a6e;color:#fff;font-weight:700;}
.pc-foot{display:flex;justify-content:space-between;padding:5px 8px;background:#1e3a6e;font-size:8px;color:#7faee0;}
</style>
</head>
<body>
<div class="wrap">
  <div class="page-header"><h1>Pitcher Game Summary</h1><p>Walters State Baseball Analytics</p></div>
  <div class="nav"><a href="index.html">Home</a><a href="games.html">Game Log</a></div>
  <div class="card"><h2>1 - Select Game</h2><select id="gameSelect"><option value="">Loading games...</option></select></div>
  <div class="card"><h2>2 - Upload Box Score PDF</h2>
    <div class="upload-zone" id="pdfZone" onclick="document.getElementById('pdfInput').click()">
      <p><strong>Tap to select</strong> box score PDF</p><p style="margin-top:3px;font-size:10px;">Parses WS pitcher stats automatically</p>
    </div>
    <input type="file" id="pdfInput" accept=".pdf">
  </div>
  <div class="card"><h2>3 - Select Pitcher</h2><select id="pitcherSelect"><option value="">Select game first</option></select></div>
  <div class="card"><h2>4 - Generate Card</h2>
    <button class="btn btn-primary" id="generateBtn" disabled onclick="generateCard()">Select game and pitcher first</button>
    <div class="status" id="genStatus"></div>
  </div>
  <div id="cardOutput">
    <div id="pitcherCard" class="pc"></div>
    <button class="btn-save" onclick="saveImage()">Save as Image</button>
  </div>
</div>

function flipName(n){if(!n)return n;if(n.indexOf(',')>-1){var p=n.split(',');return(p[1]||'').trim()+' '+(p[0]||'').trim();}return n;}

function cleanTeam(t){
  if(!t)return t;
  // Map known TrackMan team codes to readable names
  var maps={
    'CLE_CLE':'Cleveland CC','CLE_CLE1':'Cleveland CC','CLE_CLE2':'Cleveland CC',
    'WAB_WVC':'Wabash Valley','WAB_WVC1':'Wabash Valley','WAB_WVC2':'Wabash Valley',
    'DYE_EAG':'Dyersburg CC','DYE_EAG1':'Dyersburg CC','DYE_EAG2':'Dyersburg CC',
    'CLV_CST':'Cleveland State CC','CLV_CST1':'Cleveland State CC','CLV_CST2':'Cleveland State CC'
  };
  if(maps[t])return maps[t];
  // Generic cleanup: remove trailing _N, replace _ with space, title case
  var clean=t.replace(/_\d+$/,'').replace(/_/g,' ');
  return clean.split(' ').map(function(w){return w.charAt(0).toUpperCase()+w.slice(1).toLowerCase();}).join(' ');
}

async function supaFetch(path){
  var rows=[],from=0;
  while(true){
    var sep=path.indexOf('?')>-1?'&':'?';
    var r=await fetch(SUPABASE_URL+'/rest/v1/'+path+sep+'limit=1000&offset='+from,
      {headers:{'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY}});
    var d=await r.json();
    if(!Array.isArray(d)||!d.length)break;
    rows=rows.concat(d);
    if(d.length<1000)break;
    from+=1000;
  }
  return rows;
}

async function loadGames(){
  try{
    var rows=await supaFetch('pitches?select=GameID,Date');
    var gm={};
    rows.forEach(function(r){if(!gm[r.GameID])gm[r.GameID]={id:r.GameID,date:r.Date};});
    var games=Object.values(gm).sort(function(a,b){return new Date(a.date)-new Date(b.date);});
    var sel=document.getElementById('gameSelect');
    sel.innerHTML='<option value="">-- Select game --</option>';
    games.forEach(function(g){
      var d=new Date(g.date+'T12:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
      sel.innerHTML+='<option value="'+g.id+'">'+g.id+' ('+d+')</option>';
    });
  }catch(e){document.getElementById('gameSelect').innerHTML='<option>Error loading</option>';}
}

document.getElementById('gameSelect').addEventListener('change',async function(){
  var gameId=this.value;
  var psel=document.getElementById('pitcherSelect');
  if(!gameId){psel.innerHTML='<option>Select game first</option>';return;}
  psel.innerHTML='<option>Loading...</option>';
  try{
    var rows=await supaFetch('pitches?select=Pitcher,PitcherTeam&GameID=eq.'+encodeURIComponent(gameId));
    var wsP=rows.filter(function(r){return r.PitcherTeam&&r.PitcherTeam.toLowerCase().indexOf('walters')>-1;});
    var src=wsP.length?wsP:rows;
    var pitchers=[...new Set(src.map(function(r){return r.Pitcher;}))].sort();
    psel.innerHTML='<option value="">-- Select pitcher --</option>';
    pitchers.forEach(function(p){psel.innerHTML+='<option value="'+p+'">'+flipName(p)+'</option>';});
    checkReady();
  }catch(e){psel.innerHTML='<option>Error</option>';}
});
document.getElementById('pitcherSelect').addEventListener('change',checkReady);

document.getElementById('pdfInput').addEventListener('change',async function(){
  var file=this.files[0];if(!file)return;
  var zone=document.getElementById('pdfZone');
  zone.className='upload-zone';zone.innerHTML='<p>Reading PDF...</p>';
  try{
    pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
    var ab=await file.arrayBuffer();
    var pdf=await pdfjsLib.getDocument({data:ab}).promise;
    var items=[];
    for(var i=1;i<=pdf.numPages;i++){
      var page=await pdf.getPage(i);
      var content=await page.getTextContent();
      content.items.forEach(function(item){if(item.str.trim())items.push(item.str.trim());});
    }
    var result=parsePDF(items);
    pdfStats=result.stats;
    pdfOpponent=result.opponent;
    var names=Object.keys(pdfStats);
    zone.className='upload-zone done';
    zone.innerHTML=names.length?'<p>Found: '+names.map(flipName).join(', ')+'</p>':'<p style="color:#fbbf24">No WS pitchers found</p>';
    checkReady();
  }catch(e){zone.innerHTML='<p style="color:#f87171">Error: '+e.message+'</p>';}
});

function parsePDF(items){
  var stats={};
  var opponent='';
  var joined=items.join(' ');

  // Extract opponent from first line "X vs. Walters State Community College"
  var oppMatch=joined.match(/^([A-Za-z\s]+?)\s+vs\.\s+Walters State/);
  if(oppMatch)opponent=oppMatch[1].trim();

  // Find WS pitching section header
  var wsStart=joined.search(/WALTERS\s+STATE\s+COMMUNITY\s+COLLEGE\s+IP\s+H\s+R\s+ER/i);
  if(wsStart<0)return{stats:stats,opponent:opponent};

  // Skip past the NP column header
  var npPos=joined.indexOf(' NP ',wsStart);
  if(npPos<0)npPos=joined.indexOf('NP',wsStart);
  if(npPos<0)return{stats:stats,opponent:opponent};
  var section=joined.substring(npPos+2,npPos+3000);

  // Cut at Totals
  var totIdx=section.search(/\bTotals\b/i);
  if(totIdx>0)section=section.substring(0,totIdx);

  // Match pitcher lines - handles both "Last, First" and "First Last" name formats
  // Columns: IP H R ER BB SO HR WP BK HP IBB AB BF FO GO NP
  var lineRe=/([A-Z][a-zA-Z,]+(?:\s+[A-Z][a-zA-Z]+){1,3})\s*(?:\([^)]*\))?\s*(\d+\.[012])\s+(\d+)\s+(\d+)\s+(\d+)\s+(\d+)\s+(\d+)\s+(\d+)\s+(\d+)\s+(\d+)\s+(\d+)\s+(\d+)\s+(\d+)\s+(\d+)\s+(\d+)\s+(\d+)\s+(\d+)/g;
  var m;
  while((m=lineRe.exec(section))!==null){
    var name=m[1].trim();
    if(name.toLowerCase()==='totals')continue;
    // ip=m[2], h=m[3], r=m[4], er=m[5], bb=m[6], so=m[7], hr=m[8], wp=m[9], bk=m[10], hp=m[11], ibb=m[12], ab=m[13], bf=m[14], fo=m[15], go=m[16], np=m[17]
    stats[name]={ip:m[2],h:m[3],r:m[4],er:m[5],bb:m[6],so:m[7],hr:m[8],wp:m[9],bk:m[10],hp:m[11],ibb:m[12],ab:m[13],bf:m[14],fo:m[15],go:m[16],np:m[17]};
  }
  return{stats:stats,opponent:opponent};
}

function findPdf(name){
  if(!pdfStats||!Object.keys(pdfStats).length)return null;
  if(pdfStats[name])return pdfStats[name];
  var lastName=(name.indexOf(',')>-1?name.split(',')[0]:name.split(' ').pop()).trim().toLowerCase();
  var firstName=(name.indexOf(',')>-1?name.split(',')[1]:name.split(' ')[0]).trim().toLowerCase();
  for(var k of Object.keys(pdfStats)){
    var kl=k.toLowerCase();
    if(kl.indexOf(lastName)>-1&&kl.indexOf(firstName)>-1)return pdfStats[k];
    if(kl.indexOf(lastName)>-1)return pdfStats[k];
  }
  return null;
}

function checkReady(){
  var g=document.getElementById('gameSelect').value;
  var p=document.getElementById('pitcherSelect').value;
  var btn=document.getElementById('generateBtn');
  btn.disabled=!(g&&p);
  btn.textContent=g&&p?'Generate Card':'Select game and pitcher first';
}

async function generateCard(){
  var gameId=document.getElementById('gameSelect').value;
  var pitcherRaw=document.getElementById('pitcherSelect').value;
  var status=document.getElementById('genStatus');
  var btn=document.getElementById('generateBtn');
  btn.disabled=true;status.textContent='Fetching pitch data...';status.className='status';
  try{
    var pitches=await supaFetch('pitches?GameID=eq.'+encodeURIComponent(gameId)+'&Pitcher=eq.'+encodeURIComponent(pitcherRaw));
    if(!pitches.length){status.textContent='No pitch data found.';status.className='status err';btn.disabled=false;return;}
    var pdf=findPdf(pitcherRaw);
    status.textContent='Rendering card...';
    renderCard(pitcherRaw,gameId,pitches,pdf);
    status.textContent='';btn.disabled=false;
  }catch(e){status.textContent='Error: '+e.message;status.className='status err';btn.disabled=false;}
}

function avr(arr){return arr.length?(arr.reduce(function(a,b){return a+b;},0)/arr.length):null;}

function colorCell(val,field){
  var v=parseFloat(val);if(isNaN(v))return'';
  if(field==='zn'){
    if(v>=60)return'background:#4ade80;color:#064e1a;';
    if(v>=50)return'background:#a3e635;color:#1a3300;';
    if(v>=40)return'background:#fbbf24;color:#3a2000;';
    if(v>=30)return'background:#fb923c;color:#3a1200;';
    return'background:#f87171;color:#3a0000;';
  }
  if(field==='whf'){
    if(v>=30)return'background:#4ade80;color:#064e1a;';
    if(v>=20)return'background:#a3e635;color:#1a3300;';
    if(v>=12)return'background:#fbbf24;color:#3a2000;';
    if(v>=6)return'background:#fb923c;color:#3a1200;';
    return'background:#f87171;color:#3a0000;';
  }
  if(field==='str'){
    if(v>=70)return'background:#4ade80;color:#064e1a;';
    if(v>=62)return'background:#a3e635;color:#1a3300;';
    if(v>=55)return'background:#fbbf24;color:#3a2000;';
    if(v>=45)return'background:#fb923c;color:#3a1200;';
    return'background:#f87171;color:#3a0000;';
  }
  return'';
}

function fmtDate(d){if(!d)return'';return new Date(d+'T12:00:00').toLocaleDateString('en-US',{month:'2-digit',day:'2-digit',year:'numeric'});}

function drawLocChart(canvas,pitches,throwHand){
  var W=canvas.width,H=canvas.height;
  var ctx=canvas.getContext('2d');
  ctx.clearRect(0,0,W,H);
  // Coordinate space: side -2.0 to 2.0, height 0 to 5.0
  var sideMin=-2.0,sideMax=2.0,htMin=0.3,htMax=4.8;
  var margin=4;
  function toX(s){return margin+(s-sideMin)/(sideMax-sideMin)*(W-2*margin);}
  function toY(h){return H-margin-(h-htMin)/(htMax-htMin)*(H-2*margin);}
  // Strike zone rect: +-0.708 wide, 1.5 to 3.5 tall
  var szX1=toX(-0.708),szX2=toX(0.708);
  var szY1=toY(3.5),szY2=toY(1.5);
  // Draw zone
  ctx.strokeStyle='#1e3a6e';ctx.lineWidth=1.8;
  ctx.strokeRect(szX1,szY1,szX2-szX1,szY2-szY1);
  // Grid lines inside zone
  ctx.strokeStyle='#bbc8d8';ctx.lineWidth=0.7;
  var zw=szX2-szX1,zh=szY2-szY1;
  ctx.beginPath();ctx.moveTo(szX1+zw/3,szY1);ctx.lineTo(szX1+zw/3,szY2);ctx.stroke();
  ctx.beginPath();ctx.moveTo(szX1+2*zw/3,szY1);ctx.lineTo(szX1+2*zw/3,szY2);ctx.stroke();
  ctx.beginPath();ctx.moveTo(szX1,szY1+zh/3);ctx.lineTo(szX2,szY1+zh/3);ctx.stroke();
  ctx.beginPath();ctx.moveTo(szX1,szY1+2*zh/3);ctx.lineTo(szX2,szY1+2*zh/3);ctx.stroke();
  // Home plate
  var px=toX(0),py=toY(0.5);
  ctx.fillStyle='#94a3b8';
  ctx.beginPath();ctx.moveTo(px-8,py);ctx.lineTo(px+8,py);ctx.lineTo(px+8,py-5);ctx.lineTo(px,py-10);ctx.lineTo(px-8,py-5);ctx.closePath();ctx.fill();
  // Pitches
  pitches.forEach(function(p){
    var ps=parseFloat(p.PlateLocSide),ph=parseFloat(p.PlateLocHeight);
    if(isNaN(ps)||isNaN(ph))return;
    var x=toX(ps),y=toY(ph);
    x=Math.max(3,Math.min(W-3,x));y=Math.max(3,Math.min(H-3,y));
    var call=p.PitchCall||'';
    var isWhiff=call==='StrikeSwinging';
    var col=COLORS[p.TaggedPitchType||p.AutoPitchType]||'#94a3b8';
    ctx.globalAlpha=0.88;
    if(isWhiff){
      ctx.strokeStyle=col;ctx.lineWidth=2;
      ctx.beginPath();ctx.moveTo(x-4,y-4);ctx.lineTo(x+4,y+4);ctx.stroke();
      ctx.beginPath();ctx.moveTo(x+4,y-4);ctx.lineTo(x-4,y+4);ctx.stroke();
    }else{
      ctx.fillStyle=col;
      ctx.beginPath();ctx.arc(x,y,4.5,0,Math.PI*2);ctx.fill();
      ctx.strokeStyle='rgba(255,255,255,0.55)';ctx.lineWidth=0.7;
      ctx.beginPath();ctx.arc(x,y,4.5,0,Math.PI*2);ctx.stroke();
    }
    ctx.globalAlpha=1;
  });
}

function drawBreakChart(canvas,pitches){
  var W=canvas.width,H=canvas.height;
  var ctx=canvas.getContext('2d');
  ctx.clearRect(0,0,W,H);
  var cx=W/2,cy=H/2;
  ctx.strokeStyle='#d0d8e8';ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(8,cy);ctx.lineTo(W-8,cy);ctx.stroke();
  ctx.beginPath();ctx.moveTo(cx,8);ctx.lineTo(cx,H-8);ctx.stroke();
  ctx.fillStyle='#b0b8c8';ctx.font='6.5px Arial';
  ctx.textAlign='center';ctx.fillText('20',cx,10);ctx.fillText('-20',cx,H-1);
  ctx.textAlign='right';ctx.fillText('20',W-2,cy+4);
  ctx.textAlign='left';ctx.fillText('-20',3,cy+4);
  ctx.fillStyle='#94a3b8';ctx.font='6px Arial';
  ctx.textAlign='left';ctx.fillText('Glove',2,H);
  ctx.textAlign='right';ctx.fillText('Arm',W-2,H);
  pitches.forEach(function(p){
    var hb=parseFloat(p.HorzBreak),ivb=parseFloat(p.InducedVertBreak);
    if(isNaN(hb)||isNaN(ivb))return;
    var x=cx+(hb/30)*(W/2-10);
    var y=cy-(ivb/30)*(H/2-10);
    x=Math.max(3,Math.min(W-3,x));y=Math.max(3,Math.min(H-3,y));
    var col=COLORS[p.TaggedPitchType||p.AutoPitchType]||'#94a3b8';
    ctx.globalAlpha=0.85;ctx.fillStyle=col;
    ctx.beginPath();ctx.arc(x,y,4.5,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle='rgba(255,255,255,0.5)';ctx.lineWidth=0.7;
    ctx.beginPath();ctx.arc(x,y,4.5,0,Math.PI*2);ctx.stroke();
    ctx.globalAlpha=1;
  });
}

function renderCard(pitcherRaw,gameId,pitches,pdf){
  var pitcherName=flipName(pitcherRaw);
  var throws=pitches[0].PitcherThrows||'R';
  // Use PDF opponent if available, otherwise clean team code
  var opponent=pdfOpponent||cleanTeam(pitches[0].BatterTeam||gameId);
  var date=pitches[0].Date||'';
  var totalPitches=pitches.length; // Always use CSV count for NP

  // Pitch type breakdown
  var typeMap={};
  pitches.forEach(function(p){
    var t=p.TaggedPitchType||p.AutoPitchType||'Unknown';
    if(!typeMap[t])typeMap[t]={list:[],whiffs:0,strikes:0,zones:0};
    typeMap[t].list.push(p);
    var call=p.PitchCall||'';
    if(call==='StrikeSwinging')typeMap[t].whiffs++;
    if(['StrikeCalled','StrikeSwinging','FoulBall','FoulBallNotFieldable','FoulTip','InPlay'].indexOf(call)>-1)typeMap[t].strikes++;
    var ph=parseFloat(p.PlateLocHeight),ps=parseFloat(p.PlateLocSide);
    if(!isNaN(ph)&&!isNaN(ps)&&ph>=1.5&&ph<=3.5&&ps>=-0.708&&ps<=0.708)typeMap[t].zones++;
  });

  var totalW=0,totalS=0,totalZ=0;
  pitches.forEach(function(p){
    var call=p.PitchCall||'';
    if(call==='StrikeSwinging')totalW++;
    if(['StrikeCalled','StrikeSwinging','FoulBall','FoulBallNotFieldable','FoulTip','InPlay'].indexOf(call)>-1)totalS++;
    var ph=parseFloat(p.PlateLocHeight),ps=parseFloat(p.PlateLocSide);
    if(!isNaN(ph)&&!isNaN(ps)&&ph>=1.5&&ph<=3.5&&ps>=-0.708&&ps<=0.708)totalZ++;
  });

  // Arm angle - whole number + degree symbol
  var fbP=pitches.filter(function(p){var t=(p.TaggedPitchType||'').toLowerCase();return t.indexOf('fastball')>-1||t.indexOf('sinker')>-1;});
  var forA=fbP.length>3?fbP:pitches;
  var rH=forA.map(function(p){return parseFloat(p.RelHeight);}).filter(function(v){return!isNaN(v);});
  var rS=forA.map(function(p){return parseFloat(p.RelSide);}).filter(function(v){return!isNaN(v);});
  var armAngle='--';
  if(rH.length&&rS.length){
    var mH=rH.reduce(function(a,b){return a+b;},0)/rH.length;
    var mS=rS.reduce(function(a,b){return a+b;},0)/rS.length;
    armAngle=Math.round(Math.atan2(mH,Math.abs(mS))*(180/Math.PI))+'\u00b0';
  }

  // Build pitch rows
  var pitchRows=Object.entries(typeMap).map(function(e){
    var type=e[0],data=e[1];
    var n=data.list.length;
    var velos=data.list.map(function(p){return parseFloat(p.RelSpeed);}).filter(function(v){return!isNaN(v);});
    var ivbs=data.list.map(function(p){return parseFloat(p.InducedVertBreak);}).filter(function(v){return!isNaN(v);});
    var hbs=data.list.map(function(p){return parseFloat(p.HorzBreak);}).filter(function(v){return!isNaN(v);});
    var spins=data.list.map(function(p){return parseFloat(p.SpinRate);}).filter(function(v){return!isNaN(v);});
    var vaas=data.list.map(function(p){return parseFloat(p.VertApprAngle);}).filter(function(v){return!isNaN(v);});
    var relhs=data.list.map(function(p){return parseFloat(p.RelHeight);}).filter(function(v){return!isNaN(v);});
    var exts=data.list.map(function(p){return parseFloat(p.Extension);}).filter(function(v){return!isNaN(v);});
    function a1(arr){return arr.length?(arr.reduce(function(x,y){return x+y;},0)/arr.length).toFixed(1):'--';}
    function a0(arr){return arr.length?Math.round(arr.reduce(function(x,y){return x+y;},0)/arr.length):'--';}
    var avgV=velos.length?(velos.reduce(function(x,y){return x+y;},0)/velos.length).toFixed(1):'--';
    var maxV=velos.length?Math.max.apply(null,velos).toFixed(1):'--';
    return{type:type,abbr:ABBR[type]||type.substring(0,2).toUpperCase(),n:n,
      pct:((n/totalPitches)*100).toFixed(1),avgV:avgV,maxV:maxV,
      ivb:a1(ivbs),hb:a1(hbs),spin:a0(spins),vaa:a1(vaas),relh:a1(relhs),ext:a1(exts),
      zn:((data.zones/n)*100).toFixed(1),whf:((data.whiffs/n)*100).toFixed(1),
      str:((data.strikes/n)*100).toFixed(1),
      color:COLORS[type]||'#94a3b8'};
  }).sort(function(a,b){return b.n-a.n;});

  var strikePct=totalPitches>0?((totalS/totalPitches)*100).toFixed(1)+'%':'--';
  var lhh=pitches.filter(function(p){return p.BatterSide==='Left';});
  var rhh=pitches.filter(function(p){return p.BatterSide==='Right';});

  var ip=pdf?pdf.ip:'--';
  var pa=pdf?pdf.bf:'--';
  var er=pdf?pdf.er:'--';
  var h=pdf?pdf.h:'--';
  var k=pdf?pdf.so:'--';
  var bb=pdf?pdf.bb:'--';

  var legendHTML=pitchRows.map(function(r){return '<div class="pc-leg-item"><div class="pc-leg-dot" style="background:'+r.color+'"></div>'+r.type+'</div>';}).join('');

  var tableRows=pitchRows.map(function(r){
    return '<tr><td style="font-weight:800;color:'+r.color+';text-align:left;padding-left:5px;">'+r.abbr+'</td>'+
      '<td>'+r.n+'</td><td>'+r.pct+'%</td>'+
      '<td>'+r.avgV+'</td><td>'+r.maxV+'</td>'+
      '<td>'+r.ivb+'</td><td>'+r.hb+'</td><td>'+r.spin+'</td>'+
      '<td>'+r.vaa+'</td><td>'+r.relh+'</td><td>'+r.ext+'</td>'+
      '<td style="'+colorCell(r.zn,'zn')+'">'+r.zn+'%</td>'+
      '<td style="'+colorCell(r.whf,'whf')+'">'+r.whf+'%</td>'+
      '<td style="'+colorCell(r.str,'str')+'">'+r.str+'%</td></tr>';
  }).join('');

  var znAll=totalPitches>0?((totalZ/totalPitches)*100).toFixed(1)+'%':'--';
  var whAll=totalPitches>0?((totalW/totalPitches)*100).toFixed(1)+'%':'--';
  var totRow='<tr class="tot"><td style="text-align:left;padding-left:5px;">All</td><td>'+totalPitches+'</td><td>100%</td><td colspan="2">--</td><td>--</td><td>--</td><td>--</td><td>--</td><td>--</td><td>--</td><td>'+znAll+'</td><td>'+whAll+'</td><td>'+strikePct+'</td></tr>';

  document.getElementById('pitcherCard').innerHTML=
    '<div class="pc-hdr">'+
      '<img src="'+LOGO+'" class="pc-logo" alt="WS">'+
      '<div class="pc-hdr-mid">'+
        '<div class="pc-name">'+pitcherName+'</div>'+
        '<div class="pc-hand">'+(throws==='Left'?'LHP':'RHP')+' \u2014 Walters State CC</div>'+
        '<div class="pc-title">Pitcher Game Summary</div>'+
        '<div class="pc-season">2026 NJCAA Season</div>'+
      '</div>'+
      '<img src="'+LOGO+'" class="pc-logo" alt="WS">'+
    '</div>'+
    '<div class="pc-game">'+fmtDate(date)+' vs '+opponent+'</div>'+
    '<div class="pc-stat-hdr"><div>IP</div><div>NP</div><div>PA</div><div>ER</div><div>H</div><div>K</div><div>BB</div><div>Strike%</div><div>Whiffs</div></div>'+
    '<div class="pc-stat-vals"><div>'+ip+'</div><div>'+totalPitches+'</div><div>'+pa+'</div><div>'+er+'</div><div>'+h+'</div><div>'+k+'</div><div>'+bb+'</div><div>'+strikePct+'</div><div>'+totalW+'</div></div>'+
    '<div style="height:2px;background:#1e3a6e;"></div>'+
    '<div class="pc-charts" id="chartsRow">'+
      '<div class="pc-chart"><div class="pc-chart-title">Pitch Locations vs LHH</div><div class="pc-chart-sub">'+lhh.length+' Pitches</div><canvas id="cvLHH" width="120" height="135"></canvas></div>'+
      '<div class="pc-chart"><div class="pc-chart-title">Pitch Breaks</div><div class="pc-chart-sub">Arm Angle: '+armAngle+'</div><canvas id="cvBRK" width="120" height="135"></canvas></div>'+
      '<div class="pc-chart"><div class="pc-chart-title">Pitch Locations vs RHH</div><div class="pc-chart-sub">'+rhh.length+' Pitches</div><canvas id="cvRHH" width="120" height="135"></canvas></div>'+
    '</div>'+
    '<div class="pc-legend">'+legendHTML+'</div>'+
    '<div class="pc-tbl-wrap"><table class="pc-tbl">'+
      '<thead><tr><th>Pitch</th><th>N</th><th>%</th><th>Avg</th><th>Max</th><th>iVB</th><th>HB</th><th>Spin</th><th>VAA</th><th>RelH</th><th>Ext</th><th>Zn%</th><th>Whf%</th><th>Str%</th></tr></thead>'+
      '<tbody>'+tableRows+totRow+'</tbody>'+
    '</table></div>'+
    '<div class="pc-foot"><span>'+opponent+'</span><span>TrackMan \u00b7 Walters State CC \u00b7 '+fmtDate(date)+'</span><span>TrackMan</span></div>';

  setTimeout(function(){
    var cvLHH=document.getElementById('cvLHH');
    var cvBRK=document.getElementById('cvBRK');
    var cvRHH=document.getElementById('cvRHH');
    if(cvLHH)drawLocChart(cvLHH,lhh,throws);
    if(cvBRK)drawBreakChart(cvBRK,pitches);
    if(cvRHH)drawLocChart(cvRHH,rhh,throws);
  },100);

  document.getElementById('cardOutput').style.display='block';
  document.getElementById('cardOutput').scrollIntoView({behavior:'smooth'});
}
