<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>WS Baseball — TrackMan Uploader</title>
<link href="https://fonts.googleapis.com/css2?family=Abril+Fatface&family=Anton&family=Barlow+Condensed:ital,wght@0,400;0,600;1,400&family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

:root {
  --bg: #f2ead8;
  --surface: #fffdf7;
  --border: #ddd5bc;
  --accent: #1a3a5c;
  --accent-dim: rgba(26,58,92,0.08);
  --green: #2a8a4a;
  --green-dim: rgba(42,138,74,0.10);
  --red: #c0360a;
  --red-dim: rgba(192,54,10,0.08);
  --text: #1a1a2e;
  --text-dim: #9b8c74;
  --text-mid: #6b5f47;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Barlow Condensed', sans-serif;
  min-height: 100vh;
  padding: 16px 16px 48px;
}

header {
  display: flex;
  flex-direction: column;
  align-items: center;
  padding-bottom: 16px;
  border-bottom: 2px solid #1a1a2e;
  margin-bottom: 20px;
  gap: 10px;
}

#logoWrap { display: none; }
#logoWrap.has-logo { display: block; }
#logoWrap img { height: 56px; width: auto; }

.header-title {
  font-family: 'Abril Fatface', serif;
  font-size: 1.9rem;
  color: #1a1a2e;
  text-align: center;
  letter-spacing: .02em;
  line-height: 1;
}

/* Press Box section banner */
.pb-banner {
  background: #1a1a2e;
  color: #f2ead8;
  font-family: 'Anton', sans-serif;
  font-size: .7rem;
  letter-spacing: .12em;
  text-transform: uppercase;
  padding: .3rem .75rem;
  margin-bottom: 0;
}

/* Flat cards */
.surface-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-top: none;
  padding: 14px 16px;
  margin-bottom: 16px;
}

/* Upload zone */
.upload-zone {
  border: 1.5px dashed var(--border);
  padding: 32px 20px;
  text-align: center;
  margin-bottom: 16px;
  cursor: pointer;
  transition: all 0.2s;
  background: var(--surface);
}
.upload-zone.has-file {
  border-color: var(--accent);
  border-style: solid;
  background: var(--accent-dim);
}
.upload-icon { font-size: 28px; margin-bottom: 8px; display: block; }
.upload-title {
  font-family: 'Anton', sans-serif;
  font-size: .95rem;
  letter-spacing: .06em;
  text-transform: uppercase;
  color: var(--text);
  margin-bottom: 4px;
}
.upload-hint { font-size: .85rem; color: var(--text-dim); font-family: 'Barlow Condensed', sans-serif; font-style: italic; }
.file-name {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 11px;
  color: var(--accent);
  margin-top: 8px;
  word-break: break-all;
}

/* Display name */
.config-label {
  font-family: 'Anton', sans-serif;
  font-size: .65rem;
  letter-spacing: .12em;
  text-transform: uppercase;
  color: var(--text-dim);
  margin-bottom: 8px;
}
.config-row { margin-bottom: 0; }
.config-row label {
  display: block;
  font-size: .75rem;
  color: var(--text-mid);
  margin-bottom: 4px;
  font-family: 'Barlow Condensed', sans-serif;
  font-style: italic;
}
.config-row input {
  width: 100%;
  background: var(--bg);
  border: 1px solid var(--border);
  padding: 9px 12px;
  color: var(--text);
  font-family: 'IBM Plex Mono', monospace;
  font-size: 12px;
  outline: none;
  -webkit-appearance: none;
}
.config-row input:focus { border-color: #1a1a2e; }

/* Stats row */
.stats-row {
  display: flex;
  gap: 8px;
  margin-bottom: 16px;
}
.stat-box {
  flex: 1;
  background: var(--surface);
  border: 1px solid var(--border);
  padding: 12px 8px;
  text-align: center;
}
.stat-value {
  font-family: 'Anton', sans-serif;
  font-size: 1.6rem;
  color: var(--accent);
  display: block;
  letter-spacing: .02em;
}
.stat-label {
  font-size: .65rem;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: .08em;
  margin-top: 2px;
  display: block;
  font-family: 'Barlow Condensed', sans-serif;
}

/* Game info */
.game-info {
  background: var(--surface);
  border: 1px solid var(--border);
  padding: 12px 14px;
  margin-bottom: 16px;
  display: none;
}
.game-info.visible { display: block; }
.game-info-label {
  font-family: 'Anton', sans-serif;
  font-size: .65rem;
  letter-spacing: .12em;
  text-transform: uppercase;
  color: var(--text-dim);
  margin-bottom: 8px;
}
.game-info-value {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 12px;
  color: var(--text);
}
.game-info-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 5px 0;
  border-bottom: 1px solid var(--border);
}
.game-info-row:last-child { border-bottom: none; }

/* Duplicate warning */
.dup-warning {
  background: rgba(192,54,10,0.07);
  border: 1px solid rgba(192,54,10,0.25);
  padding: 12px 14px;
  margin-bottom: 16px;
  font-size: .85rem;
  color: var(--red);
  display: none;
  font-family: 'Barlow Condensed', sans-serif;
}
.dup-warning.visible { display: block; }

/* Upload button */
.upload-btn {
  width: 100%;
  background: #1a1a2e;
  color: #f2ead8;
  border: none;
  padding: 15px;
  font-family: 'Anton', sans-serif;
  font-size: 1.05rem;
  letter-spacing: .1em;
  text-transform: uppercase;
  cursor: pointer;
  -webkit-appearance: none;
  transition: opacity 0.2s;
  margin-bottom: 16px;
}
.upload-btn:disabled { opacity: 0.3; cursor: not-allowed; }
.upload-btn:not(:disabled):active { opacity: 0.8; }

/* Progress */
.progress-wrap { display: none; margin-bottom: 16px; }
.progress-wrap.visible { display: block; }
.progress-label {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 11px;
  color: var(--text-mid);
  margin-bottom: 6px;
  display: flex;
  justify-content: space-between;
}
.progress-track {
  background: var(--border);
  height: 5px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  background: #1a1a2e;
  width: 0%;
  transition: width 0.3s;
}

/* Result */
.result {
  padding: 14px;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 12px;
  line-height: 1.6;
  display: none;
}
.result.visible { display: block; }
.result.success { background: var(--green-dim); border: 1px solid rgba(76,175,125,0.3); color: var(--green); }
.result.error   { background: var(--red-dim);   border: 1px solid rgba(192,54,10,0.3);  color: var(--red); }

/* Log */
.log {
  margin-top: 12px;
  background: var(--surface);
  border: 1px solid var(--border);
  padding: 10px 12px;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 10px;
  color: var(--text-dim);
  max-height: 180px;
  overflow-y: auto;
  display: none;
}
.log.visible { display: block; }
.log-line { margin-bottom: 4px; }
.log-line.ok   { color: var(--green); }
.log-line.err  { color: var(--red); }
.log-line.info { color: var(--accent); }
</style>
</head>
<body>

<header>
  <div id="logoWrap" class="has-logo">
    <img src="https://wsccbaseball.github.io/ws-baseball/WS-RGB.png" alt="Walters State">
  </div>
  <div class="header-title">Walters State Baseball 2026</div>
</header>

<!-- Upload zone -->
<input type="file" id="fileInput" accept=".csv" style="display:none">
<div class="upload-zone" id="uploadZone" onclick="document.getElementById('fileInput').click()">
  <span class="upload-icon">⬆</span>
  <div class="upload-title">Select TrackMan CSV</div>
  <div class="upload-hint">Tap to browse files</div>
  <div class="file-name" id="fileName"></div>
</div>

<!-- Display name -->
<div id="displayNameSection" style="display:none;">
  <div class="pb-banner">Game Display Name</div>
  <div class="surface-card">
    <div class="config-row">
      <label>How this game appears in dropdowns</label>
      <input type="text" id="displayName" placeholder="e.g. Midweek — Pellissippi State Game 2" autocorrect="off" autocapitalize="words" spellcheck="false">
    </div>
  </div>

</div>

<!-- Stats -->
<div class="stats-row">
  <div class="stat-box">
    <span class="stat-value" id="statPitches">—</span>
    <span class="stat-label">Pitches</span>
  </div>
  <div class="stat-box">
    <span class="stat-value" id="statPitchers">—</span>
    <span class="stat-label">Pitchers</span>
  </div>
  <div class="stat-box">
    <span class="stat-value" id="statGames">—</span>
    <span class="stat-label">Games</span>
  </div>
</div>

<!-- Game info -->
<div class="game-info" id="gameInfo">
  <div class="game-info-label">Detected Game(s)</div>
  <div id="gameInfoRows"></div>
</div>

<!-- Duplicate warning -->
<div class="dup-warning" id="dupWarning"></div>

<!-- Upload button -->
<button class="upload-btn" id="uploadBtn" disabled>Upload to Database</button>

<!-- Progress -->
<div class="progress-wrap" id="progressWrap">
  <div class="progress-label">
    <span id="progressText">Uploading...</span>
    <span id="progressPct">0%</span>
  </div>
  <div class="progress-track">
    <div class="progress-fill" id="progressFill"></div>
  </div>
</div>

<!-- Result -->
<div class="result" id="result"></div>

<!-- Log -->
<div class="log" id="log"></div>

<script>
// ── Config ──────────────────────────────────────────────────────────
var urlInput = { value: 'https://mghrapwhvihpwgqryail.supabase.co' };
var keyInput = { value: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1naHJhcHdodmlocHdncXJ5YWlsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU0MjQ0NzUsImV4cCI6MjA5MTAwMDQ3NX0.ilNGmGOOc-TIpwQx0e1cTK1YjYF9TvdL7nEGUEXiWFc' };

// ── CSV Parser ──────────────────────────────────────────────────────
function parseCSV(text) {
  var lines = text.split(/\r?\n/);
  if (lines.length < 2) return [];
  var headers = parseCSVLine(lines[0]);
  var rows = [];
  for (var i = 1; i < lines.length; i++) {
    var line = lines[i].trim();
    if (!line) continue;
    var values = parseCSVLine(line);
    if (values.length < 2) continue;
    var row = {};
    for (var j = 0; j < headers.length; j++) {
      row[headers[j]] = values[j] !== undefined ? values[j] : '';
    }
    rows.push(row);
  }
  return rows;
}

function parseCSVLine(line) {
  var result = [];
  var current = '';
  var inQuotes = false;
  for (var i = 0; i < line.length; i++) {
    var ch = line[i];
    if (ch === '"') {
      if (inQuotes && line[i+1] === '"') { current += '"'; i++; }
      else { inQuotes = !inQuotes; }
    } else if (ch === ',' && !inQuotes) {
      result.push(current.trim());
      current = '';
    } else {
      current += ch;
    }
  }
  result.push(current.trim());
  return result;
}

// ── Column mapping ──────────────────────────────────────────────────
var NUMERIC_COLS = [
  'PAofInning','PitchofPA','Inning','Outs','Balls','Strikes',
  'PitcherId','BatterId','CatcherId',
  'RelSpeed','VertRelAngle','HorzRelAngle','SpinRate','SpinAxis',
  'RelHeight','RelSide','Extension','VertBreak','InducedVertBreak','HorzBreak',
  'PlateLocHeight','PlateLocSide','ZoneSpeed','VertApprAngle','HorzApprAngle',
  'ExitSpeed','Angle','Direction','Distance','HangTime','Bearing','ZoneTime',
  'ZoneTop','ZoneBottom','OutsOnPlay','RunsScored'
];
var NUMERIC_SET = {};
NUMERIC_COLS.forEach(function(c) { NUMERIC_SET[c] = true; });

function mapRow(csvRow) {
  var out = {};
  var keys = dbColumns ? dbColumns : Object.keys(csvRow);
  keys.forEach(function(key) {
    if (!(key in csvRow)) return;
    var val = csvRow[key];
    if (val === '' || val === null || val === undefined) {
      out[key] = null;
    } else if (NUMERIC_SET[key]) {
      var n = parseFloat(val);
      out[key] = isNaN(n) ? null : n;
    } else {
      out[key] = val;
    }
  });
  return out;
}

// ── State ───────────────────────────────────────────────────────────
var parsedRows = [];
var gameIds = [];
var dbColumns = null;

async function fetchDbColumns(url, key) {
  try {
    var res = await fetch(url + '/rest/v1/', {
      headers: { 'apikey': key, 'Authorization': 'Bearer ' + key }
    });
    var spec = await res.json();
    var props = spec && spec.definitions && spec.definitions.pitches && spec.definitions.pitches.properties;
    if (props) {
      dbColumns = Object.keys(props).filter(function(c) { return c !== 'id' && c !== 'created_at'; });
    }
  } catch(e) { dbColumns = null; }
}

// ── File input ──────────────────────────────────────────────────────
document.getElementById('fileInput').addEventListener('change', function(e) {
  var file = e.target.files[0];
  if (!file) return;
  document.getElementById('fileName').textContent = file.name;
  document.getElementById('uploadZone').classList.add('has-file');
  document.getElementById('displayNameSection').style.display = 'block';
  var suggested = file.name.replace(/\.csv$/i, '').replace(/_/g, ' ');
  document.getElementById('displayName').value = suggested;
  var reader = new FileReader();
  reader.onload = function(ev) {
    parsedRows = parseCSV(ev.target.result);
    analyzeCSV(parsedRows);
  };
  reader.readAsText(file);
});

function analyzeCSV(rows) {
  if (!rows.length) { setStats('0', '0', '0'); return; }
  var pitcherSet = {};
  rows.forEach(function(r) { if (r.Pitcher) pitcherSet[r.Pitcher] = true; });
  var gameSet = {};
  rows.forEach(function(r) {
    var gid = r.GameID || (r.Date + '_' + (r.HomeTeam || '') + '_' + (r.AwayTeam || ''));
    if (gid) gameSet[gid] = true;
  });
  gameIds = Object.keys(gameSet);
  setStats(rows.length, Object.keys(pitcherSet).length, gameIds.length);
  showGameInfo(rows);
  checkDuplicates(gameIds);
}

function setStats(pitches, pitchers, games) {
  document.getElementById('statPitches').textContent = pitches;
  document.getElementById('statPitchers').textContent = pitchers;
  document.getElementById('statGames').textContent = games;
}

function showGameInfo(rows) {
  var gameSet = {};
  rows.forEach(function(r) {
    var gid = r.GameID || '';
    if (!gameSet[gid]) {
      gameSet[gid] = {
        date: r.Date || '',
        home: r.HomeTeam || r.PitcherTeam || '',
        away: r.AwayTeam || r.BatterTeam || '',
        gid: gid
      };
    }
  });
  var html = '';
  Object.values(gameSet).forEach(function(g) {
    html += '<div class="game-info-row">' +
      '<span class="game-info-value">' + (g.away || '?') + ' @ ' + (g.home || '?') + '</span>' +
      '<span style="font-size:11px;color:var(--text-dim);font-family:\'IBM Plex Mono\',monospace">' + g.date + '</span>' +
      '</div>';
  });
  document.getElementById('gameInfoRows').innerHTML = html;
  document.getElementById('gameInfo').classList.add('visible');
}

async function checkDuplicates(gids) {
  var url = urlInput.value.trim().replace(/\/+$/, '');
  var key = keyInput.value.trim();
  if (!url || !key || !gids.length) {
    document.getElementById('uploadBtn').disabled = false;
    return;
  }
  try {
    var response = await fetch(
      url + '/rest/v1/pitches?select=GameID&GameID=in.(' + gids.map(function(g) { return '"' + g + '"'; }).join(',') + ')&limit=1',
      { headers: { 'apikey': key, 'Authorization': 'Bearer ' + key } }
    );
    var data = await response.json();
    if (data && data.length > 0) {
      document.getElementById('dupWarning').textContent = '⚠ Game data already exists in database. Uploading will add duplicate rows.';
      document.getElementById('dupWarning').classList.add('visible');
    } else {
      document.getElementById('dupWarning').classList.remove('visible');
    }
  } catch(e) {}
  document.getElementById('uploadBtn').disabled = false;
}

// ── Upload ──────────────────────────────────────────────────────────
document.getElementById('uploadBtn').addEventListener('click', async function() {
  var url = urlInput.value.trim().replace(/\/+$/, '');
  var key = keyInput.value.trim();
  if (!url || !key) { showResult('error', 'Missing Supabase URL or key.'); return; }
  if (!parsedRows.length) { showResult('error', 'No CSV loaded.'); return; }

  var btn = document.getElementById('uploadBtn');
  btn.disabled = true;
  btn.textContent = 'Uploading...';
  showProgress(true);
  clearLog();
  hideResult();

  // Step 0: check for duplicate GameIDs
  var csvGameIds = Object.keys(parsedRows.reduce(function(acc, r) {
    if (r.GameID) acc[r.GameID] = true;
    return acc;
  }, {}));

  if (csvGameIds.length) {
    try {
      var dupCheck = await fetch(url + '/rest/v1/pitches?select=GameID&GameID=in.(' + csvGameIds.map(function(g) { return '"' + g + '"'; }).join(',') + ')&limit=1', {
        headers: { 'apikey': key, 'Authorization': 'Bearer ' + key }
      });
      var dupData = await dupCheck.json();
      if (dupData && dupData.length > 0) {
        log('info', 'Game already in database. Saving display name only...');
        var displayName = document.getElementById('displayName').value.trim();
        var firstRow = parsedRows[0] || {};
        var normDate = normDateStr(firstRow.Date || '');
        log('info', 'Auto-fetching box score URL...');
        var boxScoreUrl = await autoFetchBoxScoreUrl(url, key, normDate, firstRow.GameID);
        if (boxScoreUrl) { log('ok', 'Box score URL found: ' + boxScoreUrl); }
        else { log('info', 'Box score URL not found — can add manually in Supabase later.'); }
        var gameRecord = {
          game_id: firstRow.GameID || null,
          display_name: displayName || null,
          date: normDate || null,
          home_team: firstRow.HomeTeam || null,
          away_team: firstRow.AwayTeam || null,
          pitch_count: parsedRows.length,
          box_score_url: boxScoreUrl
        };
        await fetch(url + '/rest/v1/games', {
          method: 'POST',
          headers: { 'apikey': key, 'Authorization': 'Bearer ' + key, 'Content-Type': 'application/json', 'Prefer': 'return=minimal,resolution=merge-duplicates' },
          body: JSON.stringify([gameRecord])
        });
        showProgress(false);
        btn.disabled = false;
        btn.textContent = 'Upload to Database';
        showResult('success', '✓ Display name saved. Pitches already in database — skipped.');
        log('ok', 'Game record updated: ' + (displayName || firstRow.GameID));
        return;
      }
    } catch(e) {}
  }

  // Step 1: discover DB columns
  log('info', 'Fetching DB schema...');
  var validColumns = null;
  try {
    var specRes = await fetch(url + '/rest/v1/', {
      headers: { 'apikey': key, 'Authorization': 'Bearer ' + key }
    });
    var spec = await specRes.json();
    var props = spec && spec.definitions && spec.definitions.pitches && spec.definitions.pitches.properties;
    if (props) {
      validColumns = new Set(Object.keys(props).filter(function(c) { return c !== 'id' && c !== 'created_at'; }));
      log('info', 'Schema loaded: ' + validColumns.size + ' columns found');
    }
  } catch(e) {
    log('info', 'Schema fetch failed, proceeding with auto-detection');
  }

  var csvColumns = parsedRows.length ? Object.keys(parsedRows[0]) : [];
  var skipSet = {};

  if (validColumns) {
    csvColumns.forEach(function(col) { if (!validColumns.has(col)) skipSet[col] = true; });
    var skipped = Object.keys(skipSet);
    if (skipped.length) log('info', 'Pre-filtering ' + skipped.length + ' unknown columns: ' + skipped.join(', '));
  } else {
    log('info', 'Probing schema with single row...');
    var probeRow = mapRow(parsedRows[0]);
    var probing = true;
    var probeAttempts = 0;
    var probeId = null;
    while (probing && probeAttempts < 100) {
      probeAttempts++;
      Object.keys(skipSet).forEach(function(k) { delete probeRow[k]; });
      try {
        var pr = await fetch(url + '/rest/v1/pitches', {
          method: 'POST',
          headers: { 'apikey': key, 'Authorization': 'Bearer ' + key, 'Content-Type': 'application/json', 'Prefer': 'return=representation' },
          body: JSON.stringify([probeRow])
        });
        if (pr.ok) {
          probing = false;
          var probeResult = await pr.json();
          if (probeResult && probeResult[0] && probeResult[0].id) probeId = probeResult[0].id;
          log('info', 'Schema probe complete' + (Object.keys(skipSet).length ? '. Skipped: ' + Object.keys(skipSet).join(', ') : '. No unknown columns'));
        } else {
          var pt = await pr.text();
          var cm = pt.match(/Could not find the '([^']+)' column/);
          if (cm) { skipSet[cm[1]] = true; }
          else { log('err', 'Probe error: ' + pt.substring(0, 120)); probing = false; }
        }
      } catch(e) { log('err', 'Probe failed: ' + e.message); probing = false; }
    }
    if (probeId) {
      try {
        await fetch(url + '/rest/v1/pitches?id=eq.' + probeId, {
          method: 'DELETE',
          headers: { 'apikey': key, 'Authorization': 'Bearer ' + key }
        });
        log('info', 'Probe row cleaned up');
      } catch(e) {}
    }
  }

  var BATCH = 500;
  var total = parsedRows.length;
  var uploaded = 0;
  var errors = 0;

  log('info', 'Starting upload: ' + total + ' pitches in ' + Math.ceil(total/BATCH) + ' batch(es)');

  for (var i = 0; i < total; i += BATCH) {
    var batchNum = Math.floor(i/BATCH) + 1;
    var batch = parsedRows.slice(i, i + BATCH).map(function(row) {
      var mapped = mapRow(row);
      Object.keys(skipSet).forEach(function(k) { delete mapped[k]; });
      return mapped;
    });
    var success = false;
    var attempts = 0;
    while (!success && attempts < 5) {
      attempts++;
      try {
        var res = await fetch(url + '/rest/v1/pitches', {
          method: 'POST',
          headers: { 'apikey': key, 'Authorization': 'Bearer ' + key, 'Content-Type': 'application/json', 'Prefer': 'return=minimal' },
          body: JSON.stringify(batch)
        });
        if (res.ok) {
          uploaded += batch.length;
          log('ok', 'Batch ' + batchNum + ': ' + batch.length + ' rows inserted');
          success = true;
        } else {
          var errText = await res.text();
          var colMatch = errText.match(/Could not find the '([^']+)' column/);
          if (colMatch) {
            skipSet[colMatch[1]] = true;
            batch = batch.map(function(r) { var c = Object.assign({}, r); delete c[colMatch[1]]; return c; });
          } else {
            errors += batch.length;
            log('err', 'Batch ' + batchNum + ' failed: ' + errText.substring(0, 120));
            success = true;
          }
        }
      } catch(e) { errors += batch.length; log('err', 'Batch ' + batchNum + ' error: ' + e.message); success = true; }
    }
    if (!success) { errors += batch.length; log('err', 'Batch ' + batchNum + ' gave up after retries'); }
    var pct = Math.round(Math.min((i + BATCH) / total * 100, 100));
    setProgress(pct, 'Batch ' + batchNum + ' of ' + Math.ceil(total/BATCH));
  }

  showProgress(false);

  if (errors === 0 && uploaded > 0) {
    var displayName = document.getElementById('displayName').value.trim();
    var firstRow = parsedRows[0] || {};
    var normDate = normDateStr(firstRow.Date || '');
    log('info', 'Auto-fetching box score URL from schedule...');
    var boxScoreUrl = await autoFetchBoxScoreUrl(url, key, normDate, firstRow.GameID);
    if (boxScoreUrl) { log('ok', 'Box score URL found: ' + boxScoreUrl); }
    else { log('info', 'Box score URL not found — can add manually in Supabase later.'); }
    var gameRecord = {
      game_id: firstRow.GameID || null,
      display_name: displayName || null,
      date: normDate || null,
      home_team: firstRow.HomeTeam || null,
      away_team: firstRow.AwayTeam || null,
      pitch_count: uploaded,
      box_score_url: boxScoreUrl
    };
    try {
      await fetch(url + '/rest/v1/games', {
        method: 'POST',
        headers: { 'apikey': key, 'Authorization': 'Bearer ' + key, 'Content-Type': 'application/json', 'Prefer': 'return=minimal,resolution=merge-duplicates' },
        body: JSON.stringify([gameRecord])
      });
      log('info', 'Game record saved: ' + (displayName || gameRecord.game_id));
    } catch(e) {
      log('info', 'Note: games table not yet created - run setup SQL');
    }
  }

  btn.disabled = false;
  btn.textContent = 'Upload to Database';

  if (errors === 0) {
    showResult('success', '✓ ' + uploaded + ' pitches uploaded successfully.');
    log('info', 'Done. ' + uploaded + ' rows written to database.');
  } else {
    showResult('error', uploaded + ' rows uploaded, ' + errors + ' failed. Check log below.');
  }
});

// ── Helpers ─────────────────────────────────────────────────────────
function showProgress(visible) {
  document.getElementById('progressWrap').classList.toggle('visible', visible);
  if (visible) setProgress(0, 'Starting...');
}
function setProgress(pct, text) {
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressPct').textContent = pct + '%';
  document.getElementById('progressText').textContent = text;
}
function showResult(type, msg) {
  var el = document.getElementById('result');
  el.className = 'result visible ' + type;
  el.textContent = msg;
}
function hideResult() { document.getElementById('result').classList.remove('visible'); }
function log(type, msg) {
  var logEl = document.getElementById('log');
  logEl.classList.add('visible');
  var line = document.createElement('div');
  line.className = 'log-line ' + type;
  line.textContent = '[' + new Date().toLocaleTimeString() + '] ' + msg;
  logEl.appendChild(line);
  logEl.scrollTop = logEl.scrollHeight;
}
function clearLog() {
  var logEl = document.getElementById('log');
  logEl.innerHTML = '';
  logEl.classList.remove('visible');
}
</script>
