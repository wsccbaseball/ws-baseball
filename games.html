<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WS Baseball — Game Log</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #0f1117;
    color: #e2e8f0;
    min-height: 100vh;
    padding: 24px 16px;
  }
  .header {
    text-align: center;
    margin-bottom: 28px;
  }
  .header h1 { font-size: 22px; font-weight: 700; color: #fff; }
  .header p { font-size: 13px; color: #94a3b8; margin-top: 4px; }

  .nav {
    display: flex;
    gap: 8px;
    justify-content: center;
    margin-bottom: 24px;
    flex-wrap: wrap;
  }
  .nav a {
    font-size: 12px;
    color: #4f8ef7;
    text-decoration: none;
    background: #1e2330;
    border: 1px solid #2d3548;
    border-radius: 20px;
    padding: 6px 14px;
  }

  .summary-bar {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 10px;
    margin-bottom: 20px;
  }
  .summary-item {
    background: #1e2330;
    border-radius: 10px;
    border: 1px solid #2d3548;
    padding: 14px 10px;
    text-align: center;
  }
  .summary-item .val {
    font-size: 22px;
    font-weight: 700;
    color: #fff;
  }
  .summary-item .lbl {
    font-size: 11px;
    color: #94a3b8;
    margin-top: 2px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .loading {
    text-align: center;
    padding: 40px;
    color: #94a3b8;
    font-size: 14px;
  }
  .spinner {
    display: inline-block;
    width: 24px; height: 24px;
    border: 3px solid #2d3548;
    border-top-color: #4f8ef7;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin-bottom: 10px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .game-card {
    background: #1e2330;
    border-radius: 12px;
    border: 1px solid #2d3548;
    margin-bottom: 12px;
    overflow: hidden;
  }
  .game-card-header {
    padding: 14px 16px;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
  }
  .game-opponent {
    font-size: 15px;
    font-weight: 600;
    color: #fff;
  }
  .game-date {
    font-size: 12px;
    color: #94a3b8;
    margin-top: 3px;
  }
  .game-id {
    font-size: 10px;
    color: #64748b;
    margin-top: 2px;
    font-family: monospace;
  }
  .badge {
    font-size: 11px;
    font-weight: 600;
    padding: 3px 10px;
    border-radius: 20px;
    flex-shrink: 0;
  }
  .badge-home { background: #1a3a2a; color: #4ade80; }
  .badge-away { background: #3a1a1a; color: #f87171; }

  .game-stats {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    border-top: 1px solid #2d3548;
  }
  .game-stat {
    padding: 10px;
    text-align: center;
    border-right: 1px solid #2d3548;
  }
  .game-stat:last-child { border-right: none; }
  .game-stat .sval {
    font-size: 16px;
    font-weight: 700;
    color: #e2e8f0;
  }
  .game-stat .slbl {
    font-size: 10px;
    color: #64748b;
    text-transform: uppercase;
    letter-spacing: 0.4px;
    margin-top: 1px;
  }

  .game-actions {
    border-top: 1px solid #2d3548;
    padding: 10px 16px;
    display: flex;
    gap: 8px;
  }
  .btn-delete {
    flex: 1;
    padding: 8px;
    background: #2d1a1a;
    color: #f87171;
    border: 1px solid #4a2020;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
  }
  .btn-delete:active { opacity: 0.7; }

  .confirm-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 100;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .confirm-overlay.visible { display: flex; }
  .confirm-box {
    background: #1e2330;
    border: 1px solid #2d3548;
    border-radius: 14px;
    padding: 24px;
    width: 100%;
    max-width: 340px;
  }
  .confirm-box h3 { font-size: 16px; color: #fff; margin-bottom: 8px; }
  .confirm-box p { font-size: 13px; color: #94a3b8; margin-bottom: 20px; line-height: 1.5; }
  .confirm-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .btn-cancel {
    padding: 11px;
    background: #2d3548;
    color: #e2e8f0;
    border: none;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
  }
  .btn-confirm-delete {
    padding: 11px;
    background: #f87171;
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
  }

  .empty {
    text-align: center;
    padding: 48px 20px;
    color: #64748b;
  }
  .empty .icon { font-size: 40px; margin-bottom: 12px; }
  .empty p { font-size: 14px; }
  .empty a { color: #4f8ef7; text-decoration: none; }

  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    background: #4ade80;
    color: #0f2a1a;
    font-weight: 600;
    font-size: 13px;
    padding: 10px 20px;
    border-radius: 20px;
    opacity: 0;
    transition: opacity 0.3s;
    pointer-events: none;
    white-space: nowrap;
  }
  .toast.visible { opacity: 1; }
  .toast.error { background: #f87171; color: #2a0f0f; }
</style>
</head>
<body>

<div class="header">
  <h1>⚾ WS Baseball</h1>
  <p>Game Log</p>
</div>

<div class="nav">
  <a href="upload.html">⬆ Upload Game</a>
  <a href="index.html">🏠 Hub</a>
</div>

<div class="summary-bar">
  <div class="summary-item">
    <div class="val" id="totalGames">—</div>
    <div class="lbl">Games</div>
  </div>
  <div class="summary-item">
    <div class="val" id="totalPitches">—</div>
    <div class="lbl">Pitches</div>
  </div>
  <div class="summary-item">
    <div class="val" id="dateRange">—</div>
    <div class="lbl">Season</div>
  </div>
</div>

<div id="gameList">
  <div class="loading">
    <div class="spinner"></div>
    <div>Loading games...</div>
  </div>
</div>

<!-- Confirm Delete Overlay -->
<div class="confirm-overlay" id="confirmOverlay">
  <div class="confirm-box">
    <h3>Delete Game?</h3>
    <p id="confirmText">This will permanently delete all pitches for this game from the database.</p>
    <div class="confirm-btns">
      <button class="btn-cancel" onclick="closeConfirm()">Cancel</button>
      <button class="btn-confirm-delete" onclick="confirmDelete()">Delete</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const SUPABASE_URL = 'https://mghrapwhvihpwgqryail.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1naHJhcHdodmlocHdncXJ5YWlsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU0MjQ0NzUsImV4cCI6MjA5MTAwMDQ3NX0.ilNGmGOOc-TIpwQx0e1cTK1YjYF9TvdL7nEGUEXiWFc';

let pendingDeleteGameId = null;
let allGames = [];

async function loadGames() {
  try {
    // Get all pitches grouped by GameID
    const res = await fetch(
      `${SUPABASE_URL}/rest/v1/pitches?select=GameID,Date,PitcherTeam,BatterTeam,Top/Bottom&order=Date.asc`,
      { headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` } }
    );
    const rows = await res.json();

    if (!rows.length) {
      showEmpty();
      return;
    }

    // Group by GameID
    const gameMap = {};
    rows.forEach(r => {
      const gid = r.GameID || 'Unknown';
      if (!gameMap[gid]) {
        gameMap[gid] = {
          gameId: gid,
          date: r.Date,
          pitchCount: 0,
          wsTeam: null,
          opponent: null
        };
      }
      gameMap[gid].pitchCount++;
      if (!gameMap[gid].date) gameMap[gid].date = r.Date;
    });

    allGames = Object.values(gameMap).sort((a, b) => new Date(a.date) - new Date(b.date));

    // Update summary
    const totalPitches = allGames.reduce((s, g) => s + g.pitchCount, 0);
    document.getElementById('totalGames').textContent = allGames.length;
    document.getElementById('totalPitches').textContent = totalPitches.toLocaleString();
    if (allGames.length) {
      const first = formatDate(allGames[0].date);
      const last = formatDate(allGames[allGames.length - 1].date);
      document.getElementById('dateRange').textContent = first === last ? first : first + '–' + last;
    }

    renderGames();
  } catch (e) {
    document.getElementById('gameList').innerHTML =
      `<div class="empty"><div class="icon">⚠️</div><p>Error loading games: ${e.message}</p></div>`;
  }
}

function formatDate(d) {
  if (!d) return '?';
  const dt = new Date(d + 'T12:00:00');
  return dt.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
}

function formatDateFull(d) {
  if (!d) return '?';
  const dt = new Date(d + 'T12:00:00');
  return dt.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric', year: 'numeric' });
}

function parseGameId(gameId) {
  // Try to extract info from GameID like "20260318-WaltersStateCC-2"
  // or just display raw
  return gameId;
}

function renderGames() {
  const container = document.getElementById('gameList');
  if (!allGames.length) { showEmpty(); return; }

  // Detect duplicates
  const dateCounts = {};
  allGames.forEach(g => {
    dateCounts[g.date] = (dateCounts[g.date] || 0) + 1;
  });

  container.innerHTML = allGames.map(g => {
    const isDuplicate = dateCounts[g.date] > 1;
    const gameIdParts = g.gameId.split('-');
    // Try to guess home/away from GameID
    const isHome = g.gameId.includes('WaltersState') || g.gameId.includes('WSCC');
    const badgeClass = isHome ? 'badge-home' : 'badge-away';
    const badgeText = isHome ? 'Home' : 'Away';

    return `
    <div class="game-card" id="card-${g.gameId.replace(/[^a-zA-Z0-9]/g,'-')}">
      <div class="game-card-header">
        <div>
          <div class="game-opponent">
            ${isDuplicate ? '⚠️ ' : ''}${g.gameId}
          </div>
          <div class="game-date">${formatDateFull(g.date)}</div>
          ${isDuplicate ? '<div class="game-date" style="color:#fbbf24">Possible duplicate — same date as another game</div>' : ''}
        </div>
        <span class="badge ${badgeClass}">${badgeText}</span>
      </div>
      <div class="game-stats">
        <div class="game-stat">
          <div class="sval">${g.pitchCount}</div>
          <div class="slbl">Pitches</div>
        </div>
        <div class="game-stat">
          <div class="sval">${formatDate(g.date)}</div>
          <div class="slbl">Date</div>
        </div>
        <div class="game-stat">
          <div class="sval" style="font-size:11px;color:#64748b;padding-top:4px">${g.gameId.substring(0,18)}${g.gameId.length>18?'…':''}</div>
          <div class="slbl">Game ID</div>
        </div>
      </div>
      <div class="game-actions">
        <button class="btn-delete" onclick="promptDelete('${g.gameId}', ${g.pitchCount})">
          🗑 Delete Game
        </button>
      </div>
    </div>`;
  }).join('');
}

function showEmpty() {
  document.getElementById('totalGames').textContent = '0';
  document.getElementById('totalPitches').textContent = '0';
  document.getElementById('dateRange').textContent = '—';
  document.getElementById('gameList').innerHTML = `
    <div class="empty">
      <div class="icon">📭</div>
      <p>No games uploaded yet.<br><br><a href="upload.html">Upload your first game →</a></p>
    </div>`;
}

function promptDelete(gameId, pitchCount) {
  pendingDeleteGameId = gameId;
  document.getElementById('confirmText').textContent =
    `This will permanently delete all ${pitchCount} pitches for "${gameId}". This cannot be undone.`;
  document.getElementById('confirmOverlay').classList.add('visible');
}

function closeConfirm() {
  pendingDeleteGameId = null;
  document.getElementById('confirmOverlay').classList.remove('visible');
}

async function confirmDelete() {
  if (!pendingDeleteGameId) return;
  const gameId = pendingDeleteGameId;
  closeConfirm();

  showToast('Deleting...', false, true);

  try {
    const res = await fetch(
      `${SUPABASE_URL}/rest/v1/pitches?GameID=eq.${encodeURIComponent(gameId)}`,
      {
        method: 'DELETE',
        headers: {
          'apikey': SUPABASE_KEY,
          'Authorization': `Bearer ${SUPABASE_KEY}`,
          'Prefer': 'return=minimal'
        }
      }
    );

    if (!res.ok) {
      const err = await res.text();
      showToast('Error: ' + err, true);
      return;
    }

    showToast(`✅ Deleted "${gameId}"`);
    setTimeout(() => loadGames(), 800);
  } catch (e) {
    showToast('Error: ' + e.message, true);
  }
}

function showToast(msg, isError = false, persist = false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast visible' + (isError ? ' error' : '');
  if (!persist) setTimeout(() => t.className = 'toast', 2500);
}

// Need delete policy
async function ensureDeletePolicy() {
  // We'll just try — if it fails, we'll handle it
}

loadGames();
</script>
</body>
</html>
